<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Cammino Interiore · Elisa Soul Medium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:
    radial-gradient(1000px 760px at 50% 36%, #1b1626 0%, #110d1a 42%, #08070c 72%, #000 100%);
  background-attachment:fixed;
  font-family:'Cormorant Garamond',serif;
  overflow-x:hidden;
  color:#e8e6e0;
}
#spacer{height:560vh}

.nebula{
  position:fixed;left:50%;top:40%;transform:translate(-50%,-50%);
  width:120vmin;height:90vmin;border-radius:50%;
  background:radial-gradient(ellipse,
    rgba(110,80,180,.10) 0%, rgba(80,55,140,.05) 40%, transparent 70%);
  z-index:0;pointer-events:none;filter:blur(30px);
  animation:neb 14s ease-in-out infinite alternate;
}
@keyframes neb{from{opacity:.55;transform:translate(-50%,-50%) scale(1)}
  to{opacity:1;transform:translate(-50%,-52%) scale(1.12)}}

#backlight{
  position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);
  width:70vmin;height:70vmin;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,255,255,.5) 0%, rgba(252,250,255,.2) 30%,
    rgba(248,246,252,.06) 55%, transparent 72%);
  z-index:1;pointer-events:none;filter:blur(2px);opacity:0;
}

#bookgl{position:fixed;inset:0;z-index:3;pointer-events:none}

.vignette{position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at 50% 44%,
    transparent 40%, rgba(0,0,0,.4) 78%, rgba(0,0,0,.75) 100%)}

#hint{
  position:fixed;left:50%;bottom:7vh;transform:translateX(-50%);
  z-index:7;text-align:center;pointer-events:none;
  font-family:'Cinzel',serif;color:#cbc0dd;
}
#hint .t{font-size:clamp(13px,1.9vmin,19px);letter-spacing:.42em;text-indent:.42em;
  text-transform:uppercase;font-weight:600;text-shadow:0 0 18px rgba(190,150,255,.3)}
#hint .a{margin-top:1vh;font-size:18px;color:#8a7fa0;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(8px);opacity:1}}

/* zone cliccabili agganciate alla pagina (geometria impostata da JS) */
#hotzone,#exzone{
  position:fixed;z-index:8;border-radius:14px;
  cursor:pointer;display:none;
}
#hotzone.on,#exzone.on{display:block}

/* frecce volta-pagina: disegnate NELLA pergamena, qui solo zone cliccabili invisibili */
.pgArrow{
  position:fixed;bottom:2.5vh;z-index:9;
  width:72px;height:58px;cursor:pointer;
  opacity:0;pointer-events:none;font-size:0;
}
.pgArrow.on{pointer-events:auto}
#pgPrev{left:3vw}
#pgNext{right:3vw}

/* zona touch sul bordo destro: trascina per girare pagina (mobile) */
#dragzone{
  position:fixed;right:0;top:18vh;width:16vw;height:60vh;
  z-index:8;display:none;touch-action:none;
}
#dragzone.on{display:block}

#navBtn{
  position:fixed;top:3vh;right:3vw;z-index:22;
  display:flex;align-items:center;gap:11px;
  padding:10px 22px;border-radius:50px;cursor:pointer;
  background:linear-gradient(165deg, rgba(34,30,22,.9), rgba(22,19,14,.9));
  border:1px solid rgba(201,168,76,.4);
  box-shadow:0 6px 22px rgba(0,0,0,.55);
  transition:border-color .3s ease, box-shadow .3s ease;
  user-select:none;
}
#navBtn:hover{border-color:rgba(201,168,76,.85);box-shadow:0 6px 26px rgba(0,0,0,.7),0 0 30px rgba(201,168,76,.15)}
#navBtn .ic{font-size:15px;color:#c9a84c}
#navBtn .tx{font-family:'Cinzel',serif;font-size:13px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:#e8d9ae}

#nav{
  position:fixed;top:calc(3vh + 54px);right:3vw;z-index:21;
  width:min(330px, 86vw);
  border-radius:10px;overflow:hidden;
  background-size:cover;background-position:center;
  box-shadow:0 22px 60px rgba(0,0,0,.75), 0 0 0 1px rgba(90,66,30,.5), inset 0 0 60px rgba(120,90,45,.25);
  transform-origin:50% 0;
  transform:scaleY(.02);opacity:0;pointer-events:none;
  transition:transform .42s cubic-bezier(.22,1.25,.36,1), opacity .28s ease;
}
#nav.open{transform:scaleY(1);opacity:1;pointer-events:auto}
#nav::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:14px;
  background:linear-gradient(180deg, rgba(70,50,22,0), rgba(70,50,22,.35) 50%, rgba(40,28,12,.55));
}
#nav .inner{padding:26px 24px 30px}
#nav h4{
  font-family:'Cinzel',serif;font-size:15px;font-weight:700;
  letter-spacing:.4em;text-indent:.4em;text-transform:uppercase;
  color:#4a3318;text-align:center;margin-bottom:6px;
}
#nav .rule{height:1px;margin:10px 14px 18px;
  background:linear-gradient(90deg,transparent,rgba(110,80,40,.6),transparent)}
.navItem{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;margin-bottom:10px;border-radius:8px;cursor:pointer;
  border:1px solid rgba(110,80,40,.30);
  background:rgba(255,250,235,.22);
  transform:translateX(8px) scale(.97);opacity:.78;
  transition:transform .3s ease, opacity .3s ease, border-color .3s ease, background .3s ease;
}
.navItem:hover{border-color:rgba(110,80,40,.7);background:rgba(255,250,235,.4)}
.navItem.cur{
  transform:translateX(-6px) scale(1.03);opacity:1;
  border-color:rgba(150,110,50,.85);
  background:rgba(255,250,235,.5);
  box-shadow:0 6px 16px rgba(80,55,20,.3);
}
.navItem .n{
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#8a6520;
  width:26px;text-align:center;flex-shrink:0;
}
.navItem .t{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:#4a3318;letter-spacing:.06em}
.navItem .s{margin-left:auto;font-size:13px;font-style:italic;color:#8a7348}
#navClose{
  display:block;margin:16px auto 0;padding:9px 34px;
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;
  letter-spacing:.32em;text-indent:.32em;text-transform:uppercase;
  color:#5e4014;background:none;border:1px solid rgba(110,80,40,.55);
  border-radius:40px;cursor:pointer;
  transition:background .3s ease;
}
#navClose:hover{background:rgba(110,80,40,.18)}

#vwrap{
  position:fixed;inset:0;z-index:30;display:flex;
  align-items:center;justify-content:center;
  background:rgba(4,3,8,.6);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
#vwrap.open{opacity:1;pointer-events:auto}
#vmodal{
  width:min(560px, 92vw);max-height:86vh;overflow:auto;
  border-radius:12px;
  background-size:cover;background-position:center;
  box-shadow:0 30px 90px rgba(0,0,0,.85), 0 0 0 1px rgba(90,66,30,.55), inset 0 0 80px rgba(120,90,45,.22);
  transform-origin:50% 0;transform:scaleY(.03);
  transition:transform .45s cubic-bezier(.22,1.25,.36,1);
}
#vwrap.open #vmodal{transform:scaleY(1)}
#vmodal .inner{padding:clamp(18px,5vw,34px) clamp(14px,4.5vw,34px) 26px}
#vmodal h3{
  font-family:'Cinzel',serif;font-size:20px;font-weight:700;
  letter-spacing:.14em;color:#4a3318;text-align:center;
}
#vmodal .sub{text-align:center;font-style:italic;color:#7a6238;font-size:16px;margin:6px 0 4px}
#vmodal .rule{height:1px;margin:14px 30px 22px;
  background:linear-gradient(90deg,transparent,rgba(110,80,40,.6),transparent)}
.vItem{
  display:flex;align-items:center;gap:clamp(8px,2.5vw,16px);text-decoration:none;
  overflow:hidden;
  padding:12px;margin-bottom:12px;border-radius:10px;
  border:1px solid rgba(110,80,40,.32);
  background:rgba(255,250,235,.28);
  transition:transform .25s ease, border-color .25s ease, background .25s ease;
}
.vItem:hover{transform:translateX(5px);border-color:rgba(150,110,50,.85);background:rgba(255,250,235,.5)}
.vItem img{width:clamp(72px,19vw,108px);border-radius:6px;border:1px solid rgba(110,80,40,.5);flex-shrink:0;filter:brightness(.82) sepia(.12)}
.vItem > div{flex:1 1 110px;min-width:0}
.vItem .vt{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:#4a3318}
.vItem .vs{font-size:14px;font-style:italic;color:#8a7348;margin-top:3px}
.vItem .go{margin-left:auto;font-family:'Cinzel',serif;font-size:10px;font-weight:700;
  letter-spacing:.06em;color:#8a6520;white-space:nowrap;flex-shrink:0}
#vClose{
  display:block;margin:8px auto 0;padding:9px 38px;
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;
  letter-spacing:.32em;text-indent:.32em;text-transform:uppercase;
  color:#5e4014;background:none;border:1px solid rgba(110,80,40,.55);
  border-radius:40px;cursor:pointer;
}
#vClose:hover{background:rgba(110,80,40,.18)}
#vmodal .logoRow{display:none}
#vmodal .logoRow img{width:120px;opacity:.95;border-radius:8px}

#fallback{display:none;position:fixed;inset:0;z-index:40;
  align-items:center;justify-content:center;color:#cfccc4;font-size:20px}
</style>
</head>

<script>
/* ================================================================
   SCRITTA DI LUCI → vortice → tomo → pagine del corso
   ================================================================ */
const cv = (w,h)=>{const c=document.createElement('canvas');c.width=w;c.height=h;return c};
const cvs = (w,h,s)=>{const c=document.createElement('canvas');c.width=w*s;c.height=h*s;const g=c.getContext('2d');g.scale(s,s);return c};
const TAU = Math.PI*2;
const clamp01 = v=>Math.min(1,Math.max(0,v));
const ease = t=>t*t*(3-2*t);

function pageBase(x, pg){ x.drawImage(pg, 0,0, 1024, 1220); }
function drawLogo(x, lg){ /* logo rimosso su richiesta */ }
const dia=(x,cx,cy,r)=>{x.beginPath();x.moveTo(cx,cy-r);x.lineTo(cx+r*.75,cy);
  x.lineTo(cx,cy+r);x.lineTo(cx-r*.75,cy);x.closePath();x.fill()};

function carvedButton(x, cx, cy, wd, ht, label, fs){
  x.save();
  const r = ht/2;
  const path = ()=>{ x.beginPath(); x.roundRect(cx-wd/2, cy-ht/2, wd, ht, r); };
  const g = x.createLinearGradient(0, cy-ht/2, 0, cy+ht/2);
  g.addColorStop(0,'rgba(80,56,26,.32)');
  g.addColorStop(.55,'rgba(122,92,48,.15)');
  g.addColorStop(1,'rgba(170,134,76,.24)');
  path(); x.fillStyle = g; x.fill();
  x.lineWidth = 2.4;
  x.save(); x.translate(0,-1.4); path(); x.strokeStyle='rgba(58,38,14,.6)'; x.stroke(); x.restore();
  x.save(); x.translate(0, 1.7); path(); x.strokeStyle='rgba(255,246,222,.55)'; x.stroke(); x.restore();
  path(); x.strokeStyle='rgba(96,68,30,.5)'; x.lineWidth=1; x.stroke();
  x.textAlign='center'; x.textBaseline='middle';
  x.font='700 '+(fs||27)+'px Cinzel';
  x.fillStyle='rgba(255,244,216,.5)'; x.fillText(label, cx, cy+1.6);
  x.fillStyle='#3f2c12';            x.fillText(label, cx, cy);
  x.restore();
}

/* freccia a inchiostro con ricciolo, integrata nella pagina */
function pageArrow(x, cx, cy, dir){
  x.save(); x.translate(cx,cy); if(dir<0) x.scale(-1,1);
  x.strokeStyle='rgba(104,76,36,.88)'; x.fillStyle='rgba(104,76,36,.88)';
  x.lineWidth=3.2; x.lineCap='round'; x.lineJoin='round';
  x.beginPath(); x.moveTo(-52,4); x.quadraticCurveTo(0,-12,54,0); x.stroke();
  x.beginPath(); x.moveTo(54,0); x.lineTo(34,-12);
  x.quadraticCurveTo(44,-2,54,0); x.lineTo(36,10);
  x.quadraticCurveTo(45,2,54,0); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(-52,4); x.quadraticCurveTo(-66,0,-62,-12); x.stroke();
  x.beginPath(); x.arc(-62,-15,2.6,0,TAU); x.fill();
  x.restore();
}

function welcomeCanvas(pg,lg){
  const w=1024,h=1220,c=cvs(w,h,1.5),x=c.getContext('2d');
  pageBase(x,pg);
  const ink='#4a3318', inkSoft='rgba(74,51,24,.78)';
  x.strokeStyle='rgba(118,88,44,.55)'; x.lineWidth=1.4;
  x.beginPath(); x.moveTo(w*.3,196);
  x.quadraticCurveTo(w*.4,178,w*.5,196); x.quadraticCurveTo(w*.6,214,w*.7,196);
  x.stroke();
  x.fillStyle='rgba(118,88,44,.6)'; dia(x,w/2,196,10);
  x.textAlign='center'; x.fillStyle=ink;
  x.font='600 25px Cinzel'; x.fillText('BENVENUTO NEL',w/2,286);
  x.font='700 62px Cinzel';
  x.fillText('Cammino',w/2,386); x.fillText('Interiore',w/2,464);
  x.strokeStyle='rgba(118,88,44,.45)'; x.lineWidth=1.2;
  x.beginPath(); x.moveTo(w*.34,508); x.lineTo(w*.66,508); x.stroke();
  x.fillStyle='rgba(118,88,44,.6)'; dia(x,w/2,508,7);
  x.font='italic 500 32px "Cormorant Garamond"'; x.fillStyle=inkSoft;
  const lines=['Benvenuta, benvenuto.','','Questo non è un semplice corso:',
    'è un viaggio dentro di te,','oltre il velo delle apparenze,',
    'verso la luce che già possiedi.','','Respira. Rallenta.',
    'E quando sei pronto, continua a scorrere.'];
  let yy=592;
  for (const ln of lines){ if(ln) x.fillText(ln,w/2,yy); yy+=45; }
  x.font='italic 600 36px "Cormorant Garamond"'; x.fillStyle=ink;
  x.fillText('Elisa Soul Medium',w/2,h-188);
  drawLogo(x,lg);
  return c;
}

function drawPhone(b, cx, cy, pw_, ph_, pg, tilt){
  const rr=(x0,y0,ww,hh,r)=>{b.beginPath();b.roundRect(x0,y0,ww,hh,r);};
  b.save();
  b.translate(cx,cy); b.rotate(tilt||0);
  const x0=-pw_/2, y0=-ph_/2;
  /* ombra a terra */
  b.save();
  b.rotate(-(tilt||0));
  b.fillStyle='rgba(40,25,8,.30)';
  b.beginPath(); b.ellipse(0, ph_/2+16, pw_*.52, 14, 0, 0, TAU); b.fill();
  b.restore();
  /* corpo metallico */
  b.save();
  b.shadowColor='rgba(20,12,4,.5)'; b.shadowBlur=16; b.shadowOffsetY=7;
  const mg=b.createLinearGradient(x0,y0,x0+pw_,y0+ph_);
  mg.addColorStop(0,'#544a5e'); mg.addColorStop(.25,'#2c2433');
  mg.addColorStop(.7,'#1a141f'); mg.addColorStop(1,'#0e0a12');
  rr(x0,y0,pw_,ph_,38); b.fillStyle=mg; b.fill();
  b.restore();
  /* filo luce sul bordo */
  rr(x0,y0,pw_,ph_,38);
  b.strokeStyle='rgba(255,255,255,.22)'; b.lineWidth=1.5; b.stroke();
  rr(x0+2.5,y0+2.5,pw_-5,ph_-5,34);
  b.strokeStyle='rgba(0,0,0,.6)'; b.lineWidth=2; b.stroke();
  /* pulsanti laterali */
  b.fillStyle='#5e5468';
  rr(x0+pw_-1.5, y0+74, 3.5, 30, 2); b.fill();
  rr(x0+pw_-1.5, y0+116, 3.5, 50, 2); b.fill();
  rr(x0-2, y0+92, 3.5, 38, 2); b.fill();
  /* schermo */
  const sx0=x0+8, sy0=y0+9, sw=pw_-16, sh=ph_-18;
  b.save();
  rr(sx0,sy0,sw,sh,29); b.clip();
  b.drawImage(pg, sx0,sy0,sw,sh);
  b.fillStyle='rgba(255,250,238,.18)'; b.fillRect(sx0,sy0,sw,sh);
  /* barra app scura */
  b.fillStyle='#241b26'; b.fillRect(sx0,sy0,sw,42);
  b.fillStyle='#c9a84c'; b.font='600 11px Cinzel'; b.textAlign='center';
  b.fillText('STRUMENTI DEL CAMMINO', sx0+sw/2, sy0+27);
  /* card esercizi */
  const cards=[['Spazio Emotivo','Scheda 1 · 20 min'],
               ['Osservatorio Interiore','Scheda 2 · 15 min'],
               ['Diario della Settimana','ogni sera · 2 min']];
  for (let i=0;i<3;i++){
    const cy0=sy0+58+i*82;
    rr(sx0+13,cy0,sw-26,70,10);
    b.fillStyle='rgba(255,250,238,.86)'; b.fill();
    b.fillStyle='#c9a84c'; b.fillRect(sx0+13,cy0,4,70);
    b.fillStyle='#3f2c12'; b.font='700 13.5px Cinzel'; b.textAlign='left';
    b.fillText(cards[i][0], sx0+30, cy0+29);
    b.fillStyle='rgba(110,80,40,.85)'; b.font='italic 12px "Cormorant Garamond"';
    b.fillText(cards[i][1], sx0+30, cy0+50);
    b.fillStyle='#8a6c2c'; b.font='700 16px Georgia'; b.textAlign='right';
    b.fillText('›', sx0+sw-26, cy0+42);
  }
  /* riflesso vetro diagonale */
  const gl=b.createLinearGradient(sx0,sy0,sx0+sw*.9,sy0+sh*.55);
  gl.addColorStop(0,'rgba(255,255,255,.13)');
  gl.addColorStop(.45,'rgba(255,255,255,.045)');
  gl.addColorStop(.55,'rgba(255,255,255,0)');
  b.fillStyle=gl;
  b.beginPath();
  b.moveTo(sx0,sy0); b.lineTo(sx0+sw*.62,sy0);
  b.lineTo(sx0+sw*.18,sy0+sh); b.lineTo(sx0,sy0+sh);
  b.closePath(); b.fill();
  b.restore();
  /* fotocamera punch-hole */
  b.beginPath(); b.arc(0, y0+22, 4.5, 0, TAU);
  b.fillStyle='#08060b'; b.fill();
  b.beginPath(); b.arc(-1.2, y0+20.8, 1.4, 0, TAU);
  b.fillStyle='rgba(120,140,200,.7)'; b.fill();
  b.restore();
}

function makeChapterCanvas(pg,lg,mods){
  const w=1024,h=1220;

  const FX=192,FY=226,FW=640,FH=360;

  b.textAlign='center';
  b.fillStyle='rgba(118,88,44,.9)';

  b.fillStyle='#3f2c12'; b.font='700 42px Cinzel';
  b.fillText('Le fondamenta del Cammino', w/2, 166);
  b.strokeStyle='rgba(118,88,44,.5)'; b.lineWidth=1.2;
  b.beginPath(); b.moveTo(w*.34,196); b.lineTo(w*.66,196); b.stroke();
  b.fillStyle='rgba(118,88,44,.65)'; dia(b,w/2,196,7);

  /* cornice ornata della vetrina */
  b.strokeStyle='rgba(110,80,40,.7)'; b.lineWidth=3;
  b.strokeRect(FX-10,FY-10,FW+20,FH+20);
  b.lineWidth=1; b.strokeStyle='rgba(110,80,40,.4)';
  b.strokeRect(FX-18,FY-18,FW+36,FH+36);
  /* fleuron agli angoli della cornice */
  b.fillStyle='rgba(110,80,40,.75)';
  [[FX-18,FY-18],[FX+FW+18,FY-18],[FX-18,FY+FH+18],[FX+FW+18,FY+FH+18]].forEach(function(p){
    dia(b,p[0],p[1],8);
  });
  b.strokeStyle='rgba(110,80,40,.5)'; b.lineWidth=1.4;
  [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(function(s){
    b.save();
    b.translate(s[0]>0?FX-18:FX+FW+18, s[1]>0?FY-18:FY+FH+18);
    b.scale(s[0],s[1]);
    b.beginPath(); b.moveTo(14,4); b.quadraticCurveTo(30,8,36,22); b.stroke();
    b.beginPath(); b.moveTo(4,14); b.quadraticCurveTo(8,30,22,36); b.stroke();
    b.restore();
  });
  /* regole laterali della didascalia */
  b.strokeStyle='rgba(118,88,44,.45)'; b.lineWidth=1;
  b.beginPath(); b.moveTo(220,648); b.lineTo(380,648); b.stroke();
  b.beginPath(); b.moveTo(644,648); b.lineTo(804,648); b.stroke();

  /* chip indice 2x2 */
  const chipY=712, chipH=46, chipW=394;
  function chip(cx0,cy0,label){
    b.beginPath(); b.roundRect(cx0,cy0,chipW,chipH,23);
    b.fillStyle='rgba(255,250,238,.55)'; b.fill();
    b.beginPath(); b.roundRect(cx0,cy0,chipW,chipH,23);
    b.strokeStyle='rgba(150,110,50,.6)'; b.lineWidth=1.6; b.stroke();
    b.fillStyle='#3a2a10'; b.font='600 20px Cinzel'; b.textAlign='center';
    b.fillText(label, cx0+chipW/2, cy0+30);
  }
  chip(108, chipY,           ROM[0]+' · '+names[0]);
  chip(522, chipY,           ROM[1]+' · '+names[1]);
  chip(108, chipY+chipH+18,  ROM[2]+' · '+names[2]);
  chip(522, chipY+chipH+18,  ROM[3]+' · '+names[3]);
  b.font='italic 500 20px "Cormorant Garamond"';
  b.fillStyle='rgba(74,51,24,.55)'; b.textAlign='center';
  b.fillText('tocca per aprire l’elenco dei video', w/2, chipY+chipH*2+58);

  /* ---------- banda della pratica ---------- */
  const PY=886, PB=1170;
  b.fillStyle='rgba(60,42,18,.075)';
  b.fillRect(56,PY,w-112,PB-PY);
  b.strokeStyle='rgba(110,80,40,.5)'; b.lineWidth=1.6;
  b.beginPath(); b.moveTo(56,PY); b.lineTo(w-56,PY); b.stroke();
  b.beginPath(); b.moveTo(56,PB); b.lineTo(w-56,PB); b.stroke();
  b.fillStyle='rgba(110,80,40,.6)';
  dia(b,56,PY,5); dia(b,w-56,PY,5); dia(b,56,PB,5); dia(b,w-56,PB,5);

  drawPhone(b, 226, (PY+PB)/2, 188, 250, pg, -.04);
  const ecx=664;
  b.fillStyle='rgba(118,88,44,.95)'; b.font='600 17px Cinzel'; b.textAlign='center';
  b.fillText('M E T T I T I   I N   P R A T I C A', ecx, PY+52);
  b.fillStyle='#3f2c12'; b.font='700 34px Cinzel';
  b.fillText('Gli Esercizi del Cammino', ecx, PY+98);
  b.font='italic 500 22px "Cormorant Garamond"';
  b.fillStyle='rgba(74,51,24,.8)';
  b.fillText('Le schede pratiche del corso, sempre con te.', ecx, PY+136);
  carvedButton(b, ecx, PY+196, 400, 56, 'A P R I   G L I   E S E R C I Z I', 19);
  b.font='italic 500 18px "Cormorant Garamond"';
  b.fillStyle='rgba(74,51,24,.5)';
  b.fillText('si apre la tua area pratica', ecx, PY+244);

  b.font='italic 500 19px "Cormorant Garamond"';
  b.fillStyle='rgba(74,51,24,.45)';
  b.fillText('continua a scorrere per voltare pagina', w/2, h-22);
  drawLogo(b,lg);

  /* ---------- canvas vivo: dissolvenza Ken Burns ---------- */
  const c=cvs(w,h,1.5), x=c.getContext('2d');
  const D=4.4, F=1.0;            /* durata slide, durata dissolvenza */
  function cover(img, alpha, zoom){
    const iw=img.naturalWidth||16, ih=img.naturalHeight||9;
    const fr=FW/FH, ir=iw/ih;
    let dw,dh;
    if (ir>fr){ dh=FH*zoom; dw=dh*ir; } else { dw=FW*zoom; dh=dw/ir; }
    x.globalAlpha=alpha;
    x.drawImage(img, FX+FW/2-dw/2, FY+FH/2-dh/2, dw, dh);
    x.globalAlpha=1;
  }
  function draw(t){
    x.drawImage(base,0,0,1024,1220);
    const i0=Math.floor(t/D)%mods.length;
    const i1=(i0+1)%mods.length;
    const p=(t%D)/D;
    x.save();
    x.beginPath(); x.rect(FX,FY,FW,FH); x.clip();
    cover(mods[i0].img, 1, 1.12 - .09*p);
    const fstart=1-F/D;
    if (p>fstart) cover(mods[i1].img, (p-fstart)/(F/D), 1.12);
    /* velo scuro leggero per coerenza col tomo */
    x.fillStyle='rgba(22,13,5,.18)'; x.fillRect(FX,FY,FW,FH);
    x.restore();
    /* didascalia corrente */
    const name=(p>fstart+.5*(F/D))?names[i1]:names[i0];
    const rom=(p>fstart+.5*(F/D))?ROM[i1]:ROM[i0];
    x.fillStyle='#2e2008'; x.font='600 27px Cinzel'; x.textAlign='center';
    x.fillText(rom+' · '+name, 512, 656);
    /* segnaposto: 4 diamanti */
    const active=(p>fstart+.5*(F/D))?i1:i0;
    for (let k=0;k<mods.length;k++){
      const dx=512+(k-1.5)*42;
      x.save();
      x.translate(dx,684); x.rotate(Math.PI/4);
      if (k===active){ x.fillStyle='#a8852f'; x.fillRect(-6,-6,12,12); }
      else { x.strokeStyle='rgba(110,80,40,.55)'; x.lineWidth=1.5; x.strokeRect(-5,-5,10,10); }
      x.restore();
    }
  }
  draw(0);
  return {canvas:c, draw:draw};
}

function pagesCanvas(w,h,horizontal){

  g.addColorStop(0,'#c3ad7e'); g.addColorStop(.3,'#ecdfc0');
  g.addColorStop(.7,'#dccca2'); g.addColorStop(1,'#b09a6e');
  x.fillStyle=g; x.fillRect(0,0,w,h);
  x.lineWidth=1;
  const n = horizontal ? h : w;
  for (let i=0;i<n;i+=2){
    x.strokeStyle = `rgba(${115+Math.random()*40|0},${90+Math.random()*35|0},${48+Math.random()*28|0},${.14+Math.random()*.22})`;
    x.beginPath();
    if (horizontal){ x.moveTo(0,i); x.lineTo(w,i); }
    else { x.moveTo(i,0); x.lineTo(i,h); }
    x.stroke();
  }
  return c;
}

  const scene = new THREE.Scene();

  camera.position.set(0, .15, 13.2);

  const pmrem = new THREE.PMREMGenerator(renderer);
  const envScene = new THREE.Scene();
  envScene.add(new THREE.Mesh(
    new THREE.BoxGeometry(24,24,24),
    new THREE.MeshBasicMaterial({color:0x2e2e34, side:THREE.BackSide})));
  const panel=(x,y,z,c,s)=>{
    const p = new THREE.Mesh(new THREE.PlaneGeometry(s,s), new THREE.MeshBasicMaterial({color:c}));
    p.position.set(x,y,z); p.lookAt(0,0,0); envScene.add(p);
  };
  panel(0, 2,-8, 0xffffff, 12);
  panel(-7, 8, 6, 0xf2ead8, 9);
  panel( 8, 0, 4, 0x8e96a8, 6);
  scene.environment = pmrem.fromScene(envScene, .04).texture;

  const key = new THREE.DirectionalLight(0xfff4e0, .95);
  key.position.set(-4.5, 6, 7);
  scene.add(key);
  const back = new THREE.DirectionalLight(0xffffff, .8);
  back.position.set(0, 1.5, -7);
  scene.add(back);
  scene.add(new THREE.AmbientLight(0xe8e8f0, .26));

  const T = (img, srgb)=>{
    const t = new THREE.Texture(img);
    if (srgb) t.encoding = THREE.sRGBEncoding;
    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
    t.needsUpdate = true;
    return t;
  };
  const TC = (c, srgb)=>{
    const t = new THREE.CanvasTexture(c);
    if (srgb) t.encoding = THREE.sRGBEncoding;
    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
    return t;
  };

  /* depthWrite spento finché il libro è in dissolvenza:
     altrimenti il libro invisibile "buca" la scritta di luci */
  const ALLMATS = [];
  const reg = m=>{ m.transparent=true; m.opacity=0; m.depthWrite=false; ALLMATS.push(m); return m; };

  const artMat = (c,n,r,m)=> reg(new THREE.MeshStandardMaterial({
    map: T(c,true), normalMap: T(n),
    normalScale: new THREE.Vector2(1,1),
    roughnessMap: T(r), metalnessMap: T(m),
    metalness: 1, roughness: 1, envMapIntensity: .9
  }));
  const frontMat = artMat(im.fc, im.fcn, im.fcr, im.fcm);
  const backMat  = artMat(im.bc, im.bcn, im.bcr, im.bcm);
  const spineMat = artMat(im.sc, im.scn, im.scr, im.scm);
  spineMat.side = THREE.DoubleSide;
  [spineMat.map, spineMat.normalMap, spineMat.roughnessMap, spineMat.metalnessMap].forEach(t=>{
    t.wrapS = THREE.ClampToEdgeWrapping;
    t.repeat.x = .55; t.offset.x = .225;
  });

  const leatherTex = T(im.lc,true); leatherTex.wrapS=leatherTex.wrapT=THREE.RepeatWrapping;
  const leatherNTex = T(im.ln); leatherNTex.wrapS=leatherNTex.wrapT=THREE.RepeatWrapping;
  const edgeMat = reg(new THREE.MeshStandardMaterial({
    map: leatherTex, normalMap: leatherNTex,
    normalScale:new THREE.Vector2(.6,.6),
    color: 0x8a6f4d, roughness:.8, metalness:0, envMapIntensity:.7
  }));
  const pagesSideMat = reg(new THREE.MeshStandardMaterial({
    map: TC(pagesCanvas(256,1024,false),true),
    roughness:.92, metalness:0, envMapIntensity:.5
  }));
  const pagesTopMat = reg(new THREE.MeshStandardMaterial({
    map: TC(pagesCanvas(1024,256,true),true),
    roughness:.92, metalness:0, envMapIntensity:.5
  }));
  const pageMat = c=> reg(new THREE.MeshStandardMaterial({
    map: TC(c,true), roughness:.9, metalness:0, envMapIntensity:.55
  }));

  const MODS = [
    {img:im.m1, short:'Introduzione'},
    {img:im.m2, short:'La Frequenza Nascosta'},
    {img:im.m3, short:'Lo Spazio Emotivo'},
    {img:im.m4, short:'L’Osservatorio Interiore'},
  ];

  const bookGroup = new THREE.Group();
  const H = 7, W = .845*H, THICK = .115*H, COVER_T = .09;
  const PAGES_T = THICK - 2*COVER_T;
  const hingeX = -W/2;

  const endpaperMat = pageMat(blankPageCanvas(im.pg));

  const frontPivot = new THREE.Group();
  frontPivot.position.set(hingeX, 0, PAGES_T/2 + COVER_T/2);
  const front = new THREE.Mesh(new THREE.BoxGeometry(W, H, COVER_T),
    [edgeMat,edgeMat,edgeMat,edgeMat,frontMat,endpaperMat]);
  front.position.set(W/2, 0, 0);
  frontPivot.add(front);
  bookGroup.add(frontPivot);

  const backCover = new THREE.Mesh(new THREE.BoxGeometry(W, H, COVER_T),
    [edgeMat,edgeMat,edgeMat,edgeMat,edgeMat,backMat]);
  backCover.position.set(0, 0, -(PAGES_T/2 + COVER_T/2));
  bookGroup.add(backCover);

  const lastPageMat = pageMat(comingCanvas(im.pg, im.lg));
  const pages = new THREE.Mesh(new THREE.BoxGeometry(W-.12, H-.12, PAGES_T),
    [pagesSideMat, edgeMat, pagesTopMat, pagesTopMat, lastPageMat, pagesSideMat]);
  pages.position.set(hingeX + (W-.12)/2 + .02, 0, 0);
  bookGroup.add(pages);

  const spineR = THICK/2 + .015;
  const spine = new THREE.Mesh(
    new THREE.CylinderGeometry(spineR, spineR, H, 32, 1, true, 0, Math.PI),
    spineMat);
  spine.position.set(hingeX, 0, 0);
  spine.rotation.y = Math.PI;
  bookGroup.add(spine);

  const pw = W-.18, phh = H-.16;
  function makeSheet(frontCanvas, idx, total){
    const geo = new THREE.PlaneGeometry(pw, phh, 26, 4);
    geo.translate(pw/2, 0, 0);
    const base = geo.attributes.position.array.slice();
    const mF = pageMat(frontCanvas);
    const mB = reg(new THREE.MeshStandardMaterial({
      map: TC(blankPageCanvas(im.pg),true),
      roughness:.92, metalness:0, envMapIntensity:.5, side:THREE.BackSide
    }));
    const piv = new THREE.Group();
    piv.position.set(hingeX+.05, 0, PAGES_T/2 + .004 + (total-idx)*.0022);
    piv.add(new THREE.Mesh(geo, mF));
    piv.add(new THREE.Mesh(geo, mB));
    bookGroup.add(piv);
    return {piv, geo, base, last:-1, idx};
  }
  function setFlip(sh, f){
    if (Math.abs(f - sh.last) < 1e-4) return;
    sh.last = f;
    const curl = Math.sin(clamp01(f)*Math.PI) * 1.25;
    const pos = sh.geo.attributes.position;
    const arr = pos.array, b = sh.base;
    for (let i=0;i<arr.length;i+=3){
      const u = b[i]/pw;
      arr[i+2] = Math.sin(u*Math.PI*.92) * curl;
    }
    pos.needsUpdate = true;
    sh.geo.computeVertexNormals();
    sh.piv.rotation.y = -(2.86 + sh.idx*.012) * ease(clamp01(f));
  }

  const TOTAL = 5;
  const qSheets = [0,1,2].map(i=>makeSheet(blankPageCanvas(im.pg), i, TOTAL));
  const wSheet  = makeSheet(welcomeCanvas(im.pg, im.lg), 3, TOTAL);
  const chap = makeChapterCanvas(im.pg, im.lg, MODS);
  const c1Sheet = makeSheet(chap.canvas, 4, TOTAL);
  const c1Tex = c1Sheet.piv.children[0].material.map;

  bookGroup.visible = false;
  scene.add(bookGroup);

  /* ---- LA SCRITTA DI LUCI ---- */
  const txtPts = sampleTitle();
  const worldW = 2*Math.tan(35*Math.PI/360)*13.2*camera.aspect;
  const fit = Math.min(1, worldW*.84/10.6);
  /* il libro non deve mai uscire dai bordi: scala massima dal viewport */
  let sFit;
  const calcSFit = ()=>{
    const visW = 2*12.1*Math.tan(35*Math.PI/360)*camera.aspect;
    /* mobile: conta solo la pagina destra, con margine garantito */
    sFit = camera.aspect < 1 ? (visW*.86)/(W-.18) : (visW*.82)/W;
  };
  calcSFit();
  const HN = 5200;
  const holoGeo = new THREE.BufferGeometry();
  const hPos = new Float32Array(HN*3);
  const hText = new Float32Array(HN*3);
  const hMid = new Float32Array(HN*3);
  const hTarget = new Float32Array(HN*3);
  const hStag = new Float32Array(HN);
  const cosR=Math.cos(-.42), sinR=Math.sin(-.42);
  /* le luci compongono il libro con la STESSA scala del libro vero
     (su mobile: più piccolo in larghezza, allungato in altezza) */
  const sForm = Math.min(.55, sFit);
  const syForm = camera.aspect < 1 ? Math.min(sForm*1.45, .95) : sForm;
  for (let i=0;i<HN;i++){
    const tp = txtPts[(Math.random()*txtPts.length)|0];
    hText[i*3]   = tp[0]*10.6*fit + (Math.random()-.5)*.02;
    hText[i*3+1] = (tp[1]*2.3 + .55)*Math.max(fit,.75) + (Math.random()-.5)*.02;
    hText[i*3+2] = (Math.random()-.5)*.12;
    const a = Math.random()*TAU, r = 3.5 + Math.random()*4.5;
    hMid[i*3]   = Math.cos(a)*r;
    hMid[i*3+1] = (Math.random()-.5)*9;
    hMid[i*3+2] = Math.sin(a)*r;
    const f = Math.random();
    let X,Y,Z;
    if (f < .36){ X=(Math.random()-.5)*W; Y=(Math.random()-.5)*H; Z= THICK/2; }
    else if (f < .72){ X=(Math.random()-.5)*W; Y=(Math.random()-.5)*H; Z=-THICK/2; }
    else if (f < .84){ const th=Math.random()*Math.PI;
      X=-W/2 - Math.sin(th)*spineR*.9; Y=(Math.random()-.5)*H; Z=Math.cos(th)*spineR*.9; }
    else if (f < .92){ X=(Math.random()-.5)*W; Y= H/2; Z=(Math.random()-.5)*THICK; }
    else if (f < .97){ X=(Math.random()-.5)*W; Y=-H/2; Z=(Math.random()-.5)*THICK; }
    else { X=W/2; Y=(Math.random()-.5)*H; Z=(Math.random()-.5)*THICK; }
    hTarget[i*3]   = (X*cosR + Z*sinR)*sForm;
    hTarget[i*3+1] = Y*syForm;
    hTarget[i*3+2] = (-X*sinR + Z*cosR)*sForm;
    hStag[i] = Math.random()*.3;
    hPos[i*3]=hText[i*3]; hPos[i*3+1]=hText[i*3+1]; hPos[i*3+2]=hText[i*3+2];
  }
  holoGeo.setAttribute('position', new THREE.BufferAttribute(hPos,3));
  const holoSprite = (()=>{
    const c=cv(32,32), x=c.getContext('2d');
    const g=x.createRadialGradient(16,16,0,16,16,16);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(.4,'rgba(240,238,255,.6)');
    g.addColorStop(1,'rgba(230,228,255,0)');
    x.fillStyle=g; x.fillRect(0,0,32,32);
    return new THREE.CanvasTexture(c);
  })();
  const holoMat = new THREE.PointsMaterial({
    size:.055, map:holoSprite, color:0xc2a8f2,
    blending:THREE.AdditiveBlending, transparent:true,
    depthWrite:false, opacity:.95
  });
  const holo = new THREE.Points(holoGeo, holoMat);
  scene.add(holo);
  const COL_P = new THREE.Color(0xc2a8f2), COL_W = new THREE.Color(0xdfe9ff);

  /* ================================================================
     REGIA
     ================================================================ */
  const hint = document.getElementById('hint');
  const backlight = document.getElementById('backlight');
  const hotzone = document.getElementById('hotzone');
  const exzone = document.getElementById('exzone');
  const spacer = document.getElementById('spacer');
  const navItems = [...document.querySelectorAll('.navItem')];
  const pgPrev = document.getElementById('pgPrev');
  const pgNext = document.getElementById('pgNext');
  const dragzone = document.getElementById('dragzone');
  let curIdx = 0;
  let curSx = .55, curSy = .55;
  let frameNo = 0;

  /* proietta una fascia della pagina destra sullo schermo */
  function placeZone(el, f0, f1){
    const d = 13.2 - bookGroup.position.z;
    const halfH = Math.tan(35*Math.PI/360)*d;
    const halfW = halfH*camera.aspect;
    const x0 = bookGroup.position.x + curSx*(hingeX+.05);
    const x1 = x0 + curSx*pw;
    const camY = .15;
    const yTop = bookGroup.position.y + curSy*phh*(.5 - f0);
    const yBot = bookGroup.position.y + curSy*phh*(.5 - f1);
    const L = ((x0/(2*halfW))+.5)*100, R = ((x1/(2*halfW))+.5)*100;
    const T = (((camY-yTop)/(2*halfH))+.5)*100, B = (((camY-yBot)/(2*halfH))+.5)*100;
    el.style.left = L+'%'; el.style.top = T+'%';
    el.style.width = Math.max(0,R-L)+'%';
    el.style.height = Math.max(0,B-T)+'%';
  }

  let scrollRaw = 0, ps = 0, solid = false;
  const updateScroll = ()=>{
    const max = spacer.offsetHeight - innerHeight;
    scrollRaw = max>0 ? clamp01(scrollY/max) : 0;
  };
  addEventListener('scroll', updateScroll, {passive:true});
  updateScroll();

  const ph = (a,b)=>clamp01((ps-a)/(b-a));

  const clock = new THREE.Clock();
  (function loop(){
    requestAnimationFrame(loop);
    const t = clock.getElapsedTime();
    ps += (scrollRaw - ps)*.075;

    const pVortex = ease(ph(.012,.13));
    const pSolid  = ease(ph(.13,.20));
    const pOpen   = ease(ph(.23,.33));
    const pZoom   = ease(ph(.37,.47));

    bookGroup.visible = pSolid > .001;

    if (ps < .27){
      for (let i=0;i<HN;i++){
        const k = ease(clamp01((pVortex - hStag[i]) / .7));
        const k1 = 1-k;
        const w0 = k1*k1, w1 = 2*k1*k, w2 = k*k;
        const a0 = Math.atan2(hMid[i*3+2], hMid[i*3]) + t*(.4+hStag[i]);
        const r0 = Math.hypot(hMid[i*3], hMid[i*3+2]);
        const mx = Math.cos(a0)*r0, mz = Math.sin(a0)*r0;
        const tw = Math.sin(t*1.8 + i*1.7)*.014*(1-k);
        hPos[i*3]   = w0*hText[i*3]   + w1*mx          + w2*hTarget[i*3] + tw;
        hPos[i*3+1] = w0*hText[i*3+1] + w1*hMid[i*3+1] + w2*hTarget[i*3+1] + tw*.6;
        hPos[i*3+2] = w0*hText[i*3+2] + w1*mz          + w2*hTarget[i*3+2];
      }
      holoGeo.attributes.position.needsUpdate = true;
      holoMat.color.lerpColors(COL_P, COL_W, clamp01(pVortex*1.4));
    }
    holoMat.opacity = (1-pSolid) * (.88 + Math.sin(t*2.1)*.08);

    const op = pSolid;
    if (!solid){
      for (const m of ALLMATS) m.opacity = op;
      if (op >= .999){
        for (const m of ALLMATS){ m.transparent=false; m.opacity=1; m.depthWrite=true; }
        solid = true;
      }
    } else if (op < .999){
      solid = false;
      for (const m of ALLMATS){ m.transparent=true; m.opacity=op; m.depthWrite=false; }
    }

    const idle = (1-pZoom);
    bookGroup.rotation.y = -.42*(1-pZoom) + Math.sin(t*.3)*.012*idle;
    bookGroup.rotation.x = .055*(1-pZoom) + Math.cos(t*.24)*.008*idle;
    const mob = camera.aspect < 1;
    let sx, sy, xOff;
    if (mob){
      /* mobile: libro verticale allungato, pagina destra centrata */
      const s = Math.min(.55 + pZoom*.27, sFit);
      sx = s; sy = Math.min(s*1.45, .95);
      xOff = pOpen*.1;
    } else {
      /* PC: zoom forte sulla pagina, libro più largo,
         copertina sinistra quasi fuori scena */
      const visH = 2*12.1*Math.tan(35*Math.PI/360);
      const syT = Math.min((visH*.9)/H, 1.04);
      const sxT = syT*1.30;
      sy = .55 + (syT-.55)*pZoom;
      sx = .55 + (sxT-.55)*pZoom;
      xOff = pOpen*.4 + pZoom*.6;
    }
    bookGroup.scale.set(sx, sy, sx);
    curSx = sx; curSy = sy;
    bookGroup.position.z = pZoom*1.1;
    bookGroup.position.y = Math.sin(t*.5)*.05*idle;
    bookGroup.position.x = xOff;

    frontPivot.rotation.y = -2.95*pOpen;
    setFlip(qSheets[0], ph(.29,.37));
    setFlip(qSheets[1], ph(.32,.40));
    setFlip(qSheets[2], ph(.35,.43));
    setFlip(wSheet,  ph(.46,.60));
    setFlip(c1Sheet, ph(.70,.86));

    /* carosello dei video: la pagina del capitolo è viva */
    frameNo++;
    if (ps > .50 && ps < .84 && frameNo % 2 === 0){
      chap.draw(t);
      c1Tex.needsUpdate = true;
    }

    const pulse = .5 + Math.sin(t*1.6)*.14;
    backlight.style.opacity = ((pulse*(.45+pVortex*.55) + pSolid*.15)*clamp01(pVortex*2)).toFixed(3);
    backlight.style.transform =
      `translate(-50%,-50%) scale(${(1 + pVortex*.55 + Math.sin(t*1.6)*.04).toFixed(3)})`;

    hint.style.opacity = 1 - ph(.008,.05);

    /* attive APPENA la pagina è voltata: vale anche lo scroll grezzo,
       così non serve aspettare l'ammortizzazione */
    const inWin = v => v>=.595 && v<=.705;
    const inC1 = inWin(ps) || inWin(scrollRaw);
    hotzone.classList.toggle('on', inC1);
    exzone.classList.toggle('on', inC1);
    if (inC1){
      placeZone(hotzone, .155, .695);  /* vetrina + chip indice */
      placeZone(exzone,  .72, .96);    /* banda esercizi */
    }

    const cur = ps < .53 ? 0 : (ps < .79 ? 1 : 2);
    navItems.forEach((it,i)=>it.classList.toggle('cur', i===cur));
    curIdx = cur;
    const showAr = ps > .42;
    /* frecce in pagina rimosse su richiesta */
    dragzone.classList.toggle('on', showAr);

    renderer.render(scene, camera);
  })();

  /* ---- interfaccia ---- */
  const navBtn = document.getElementById('navBtn');
  const nav = document.getElementById('nav');
  navBtn.addEventListener('click', ()=>nav.classList.toggle('open'));
  document.getElementById('navClose').addEventListener('click', ()=>nav.classList.remove('open'));
  navItems.forEach(it=>{
    it.addEventListener('click', ()=>{
      nav.classList.remove('open');
      goTo(parseFloat(it.dataset.ps));
    });
  });
  function tweenTo(px, D){
    const from = scrollY, t0 = performance.now(); D = D || 700;
    (function step(n){
      const k = Math.min(1,(n-t0)/D);
      const e = k<.5 ? 2*k*k : 1-Math.pow(-2*k+2,2)/2;
      window.scrollTo(0, from+(px-from)*e);
      if (k<1) requestAnimationFrame(step);
    })(t0);
  }
  function goTo(psT){
    tweenTo(psT*(spacer.offsetHeight - innerHeight), 900);
  }
  /* frecce: voltano pagina con l'animazione dello sfoglio */
  const ANCH = [.44, .655, .94];
  pgPrev.addEventListener('click', ()=>goTo(ANCH[Math.max(0, curIdx-1)]));
  pgNext.addEventListener('click', ()=>goTo(ANCH[Math.min(2, curIdx+1)]));

  /* trascina il bordo destro: la pagina segue il dito */
  const drag = {on:false, sx:0, sy:0, ss:0, horiz:null};
  dragzone.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    drag.on = true; drag.sx = t.clientX; drag.sy = t.clientY;
    drag.ss = scrollY; drag.horiz = null;
  }, {passive:true});
  dragzone.addEventListener('touchmove', e=>{
    if (!drag.on) return;
    const t = e.touches[0];
    const dx = drag.sx - t.clientX, dy = drag.sy - t.clientY;
    if (drag.horiz === null && (Math.abs(dx)>8 || Math.abs(dy)>8))
      drag.horiz = Math.abs(dx) > Math.abs(dy);
    if (drag.horiz){
      e.preventDefault();
      const max = spacer.offsetHeight - innerHeight;
      const next = Math.min(2, curIdx+1);
      const sec = Math.max(.08, ANCH[next]-ANCH[curIdx]) * max;
      window.scrollTo(0, Math.max(0, Math.min(max, drag.ss + (dx/(innerWidth*.72))*sec)));
    }
  }, {passive:false});
  const endDrag = ()=>{
    if (drag.on && drag.horiz){
      const max = spacer.offsetHeight - innerHeight;
      let best = ANCH[0]*max, bd = Infinity;
      for (const a of ANCH){
        const d = Math.abs(scrollY - a*max);
        if (d < bd){ bd = d; best = a*max; }
      }
      tweenTo(best, 500);
    }
    drag.on = false;
  };
  dragzone.addEventListener('touchend', endDrag);
  dragzone.addEventListener('touchcancel', endDrag);

  const vwrap = document.getElementById('vwrap');
  hotzone.addEventListener('click', ()=>vwrap.classList.add('open'));
  exzone.addEventListener('click', ()=>{ window.location.href = '/app/'; });
  document.getElementById('vClose').addEventListener('click', ()=>vwrap.classList.remove('open'));
  vwrap.addEventListener('click', e=>{ if (e.target===vwrap) vwrap.classList.remove('open'); });

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    calcSFit();
    renderer.setSize(innerWidth, innerHeight);
    updateScroll();
  });
}

init().catch(e=>{
  console.error(e);
  document.getElementById('fallback').style.display='flex';
});
</script>
</body>
</html>
