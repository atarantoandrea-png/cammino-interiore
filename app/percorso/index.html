<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<script>
/* accesso controllato da /app/ — qui si verifica solo la sessione, senza form */
(function(){
  var email, token;
  try{ email=(localStorage.getItem('ovl-user')||'').trim().toLowerCase(); token=localStorage.getItem('ovl-session')||''; }
  catch(e){ location.replace('/app/'); return; }
  if(!email||!token){ location.replace('/app/'); return; }
  fetch('/api/auth/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,token:token})})
    .then(function(r){return r.json();})
    .then(function(d){ if(!d.ok) location.replace('/app/'); })
    .catch(function(){}); /* offline: entra */
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Il Cammino Interiore · Elisa Soul Medium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
:root{
  --glic:#b9a3e3; --glic-hi:#dccdf6; --glic-deep:#8a6fc0;
  --gold:#c9a84c; --gold-pale:#e8d9ae;
  --txt:#e6e0ec; --txt-soft:#b7aec4; --txt-dim:#8d8499;
  --card:rgba(22,18,29,.72); --card-line:rgba(185,163,227,.16);
  --seen:#7fd6a0; --seen-glow:rgba(127,214,160,.5);
}
html{scroll-behavior:smooth}
body{
  background:
    linear-gradient(180deg, rgba(8,7,11,.95) 0%, rgba(10,9,13,.92) 8%, rgba(11,10,14,.91) 100%),
    url('/src/pagina.jpg') center top/100% auto repeat;
  background-attachment:fixed;
  font-family:'Cormorant Garamond',Georgia,serif;color:var(--txt);min-height:100vh;
}
/* colore della luce guida = livello (fiore) della persona; applyTier mette la classe ltN sul body */
body{--lm-c1:#fff4ea;--lm-mid:#dca06b;--lm-g1:rgba(235,186,138,.7);--lm-g2:rgba(205,148,96,.46);--lm-g3:rgba(176,112,64,.24)}
body.lt1{--lm-c1:#eef4f8;--lm-mid:#a8c8e0;--lm-g1:rgba(190,218,240,.88);--lm-g2:rgba(148,188,218,.54);--lm-g3:rgba(108,158,196,.27)}
body.lt2{--lm-c1:#ffffff;--lm-mid:#c6cbd2;--lm-g1:rgba(214,220,228,.85);--lm-g2:rgba(172,182,194,.5);--lm-g3:rgba(132,144,158,.27)}
body.lt3{--lm-c1:#ffffff;--lm-mid:#b9ddf6;--lm-g1:rgba(190,225,252,.9);--lm-g2:rgba(126,190,242,.52);--lm-g3:rgba(88,160,228,.26)}
body.lt4{--lm-c1:#ffffff;--lm-mid:#a7b6ef;--lm-g1:rgba(180,194,252,.9);--lm-g2:rgba(128,148,238,.52);--lm-g3:rgba(98,118,222,.26)}
body.lt5{--lm-c1:#ffffff;--lm-mid:#ad7ff0;--lm-g1:rgba(206,170,255,.9);--lm-g2:rgba(164,112,246,.5);--lm-g3:rgba(128,76,226,.26)}
body.lt6{--lm-c1:#ffffff;--lm-mid:#cdb2f2;--lm-g1:rgba(225,205,255,.95);--lm-g2:rgba(186,150,240,.56);--lm-g3:rgba(150,110,215,.3)}

/* ================= LA LUCE GUIDA ================= */
#lume{position:absolute;left:0;top:0;z-index:40;width:56px;height:56px;margin:-28px 0 0 -28px;
  pointer-events:auto;cursor:pointer;transition:transform 1.4s cubic-bezier(.45,.05,.25,1), opacity .8s ease;
  animation:lflick 3.1s ease-in-out infinite}
@keyframes lflick{0%,100%{filter:brightness(1)}50%{filter:brightness(1.28)}}
#lume::after{content:'';position:absolute;inset:19px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, var(--lm-c1) 0%, var(--lm-c1) 28%, var(--lm-mid) 58%, transparent 78%);
  box-shadow:0 0 12px 4px var(--lm-g1),0 0 38px 16px var(--lm-g2),0 0 95px 44px var(--lm-g3),inset 0 0 4px rgba(220,215,245,.5);
  transition:box-shadow 1.2s ease, inset 1.2s ease}
#lume.boost::after{inset:15px;
  box-shadow:0 0 18px 7px var(--lm-g1),0 0 60px 26px var(--lm-g2),0 0 150px 70px var(--lm-g3),inset 0 0 7px rgba(230,225,255,.7)}
#lume::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(220,205,255,.0);
  animation:lpulse 2.6s ease-in-out infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 0 var(--lm-g2)}50%{box-shadow:0 0 0 7px transparent}}
@media(max-width:760px){
  #lume{width:42px;height:42px;margin:-21px 0 0 -21px}
  #lume::after{inset:13px;box-shadow:0 0 8px 3px var(--lm-g1),0 0 24px 9px var(--lm-g2),0 0 54px 22px var(--lm-g3),inset 0 0 4px rgba(220,215,245,.5)}
  #lume.boost::after{inset:11px;box-shadow:0 0 11px 4px var(--lm-g1),0 0 34px 13px var(--lm-g2),0 0 74px 32px var(--lm-g3),inset 0 0 5px rgba(230,225,255,.6)}
}

/* ================= colonna ================= */
.page{max-width:760px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 8px) 0 48px;position:relative}
@media(min-width:920px){.page{padding-top:14px}}

/* ================= header ================= */
.hd{padding:26px 22px 14px;text-align:center}
.hd .orn{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.hd .orn .l{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(185,163,227,.6),transparent)}
.hd .orn .d{width:6px;height:6px;border:1px solid var(--glic);transform:rotate(45deg)}
.hd .cap{font-family:'Cinzel',serif;font-size:14.5px;font-weight:600;letter-spacing:.32em;
  color:var(--gold);text-shadow:0 0 14px rgba(201,168,76,.4);margin-bottom:8px}
.hd h1{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(23px,5.4vw,33px);letter-spacing:.07em;
  color:#f0eaf6;text-shadow:0 0 30px rgba(185,163,227,.35)}
.hd .lead{font-size:20px;color:var(--txt-soft);margin:13px auto 0;max-width:600px;line-height:1.55}
.hd .lead b{color:var(--gold-pale);font-weight:600}
.hd .lead .em{color:var(--glic-hi)}

.intro{margin:18px 18px 4px;padding:16px 18px;border:1px solid rgba(201,168,76,.28);border-radius:16px;
  background:linear-gradient(180deg, rgba(40,33,22,.55), rgba(22,17,28,.7));
  box-shadow:0 4px 14px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
  font-size:19px;color:var(--txt-soft);line-height:1.55;text-align:center}
.intro b{color:var(--gold-pale);font-weight:600}
.intro .lampada{display:block;font-family:'Cinzel',serif;font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--glic);margin-top:10px}

/* freccetta indietro FISSA */
.back-fab{position:fixed;z-index:50;
  top:calc(12px + env(safe-area-inset-top,0px));
  left:calc(12px + env(safe-area-inset-left,0px));
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--glic-hi);
  background:rgba(16,12,24,.42);border:1px solid rgba(205,178,242,.32);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 4px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
  transition:background .2s,border-color .2s,transform .2s,box-shadow .2s}
.back-fab:hover{background:rgba(40,30,60,.62);border-color:rgba(220,205,250,.7);transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(120,80,200,.35), inset 0 1px 0 rgba(255,255,255,.12)}
.back-fab svg{width:18px;height:18px;display:block;filter:drop-shadow(0 0 4px rgba(185,163,227,.4))}
@media(max-width:520px){.back-fab{width:38px;height:38px}}

/* ================= il video ================= */
.vid{position:relative;padding-top:56.25%;height:0;overflow:hidden;background:#000;
  border:1px solid var(--card-line);border-radius:16px;margin:24px 18px 10px;
  box-shadow:0 8px 26px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04)}
.vid iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.vid .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:14.5px;letter-spacing:.12em;color:var(--txt-dim)}
.vmeta{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:12px 18px 0}
.vmeta .vdur{font-size:17px;color:var(--txt-dim);font-style:italic}
.vstatus{font-family:'Cinzel',serif;font-size:13.5px;letter-spacing:.06em;color:var(--txt-dim);white-space:nowrap}
.vstatus.is-seen{color:var(--seen);text-shadow:0 0 8px var(--seen-glow)}
.lcomplete{font-family:'Cinzel',serif;font-size:14.5px;letter-spacing:.08em;cursor:pointer;
  padding:9px 18px;border-radius:22px;color:var(--glic-hi);
  border:1px solid rgba(185,163,227,.5);background:linear-gradient(180deg, rgba(60,46,92,.6), rgba(34,26,52,.7));
  box-shadow:0 3px 10px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);transition:all .22s}
.lcomplete:hover{border-color:rgba(205,178,242,.8);color:#fff;box-shadow:0 4px 14px rgba(120,80,200,.4)}
.lcomplete.is-done{color:#0e2a1b;border-color:rgba(127,214,160,.8);
  background:linear-gradient(180deg, #9fe6bd, var(--seen));text-shadow:none;
  box-shadow:0 3px 12px var(--seen-glow), inset 0 1px 0 rgba(255,255,255,.4)}
.lcomplete.is-done::before{content:'✓ '}

/* ================= testo curato ================= */
.txt{margin:20px 18px 0;font-size:19.5px;color:var(--txt-soft);line-height:1.62}
.txt p{margin-bottom:13px}
.txt b{color:var(--gold-pale);font-weight:600}
.txt .em{color:var(--glic-hi)}
.points{list-style:none;margin:16px 18px 0;padding:0;display:flex;flex-direction:column;gap:10px}
.points li{position:relative;padding:13px 16px 13px 40px;border:1px solid var(--card-line);border-radius:14px;
  background:linear-gradient(180deg, rgba(26,21,36,.72), rgba(16,13,23,.82));
  font-size:18.5px;color:var(--txt-soft);line-height:1.5}
.points li b{color:var(--gold-pale);font-weight:600}
.points li::before{content:'';position:absolute;left:16px;top:19px;width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%, var(--glic-hi), var(--glic-deep));box-shadow:0 0 8px rgba(185,163,227,.6)}

/* nota di sblocco (solo Capitolo 1) */
.unlock{margin:18px 18px 0;padding:15px 18px;border:1px solid rgba(201,168,76,.32);border-radius:16px;
  background:linear-gradient(180deg, rgba(40,33,22,.55), rgba(22,17,28,.72));
  font-size:18.5px;color:var(--txt-soft);line-height:1.55;text-align:center}
.unlock b{color:var(--gold-pale);font-weight:600}
.unlock.done{border-color:rgba(127,214,160,.45);background:linear-gradient(180deg, rgba(22,42,30,.5), rgba(16,26,21,.7))}
/* pulsante "vai alla sessione successiva" (Giornaliero): CTA dorata, illuminata */
.nextbtn{font-family:'Cinzel',serif;font-size:15.5px;letter-spacing:.05em;cursor:pointer;
  padding:13px 26px;border-radius:26px;color:#2a2036;border:1px solid rgba(232,217,174,.85);
  background:linear-gradient(180deg, var(--gold-pale), var(--gold));
  box-shadow:0 5px 18px rgba(201,168,76,.42), inset 0 1px 0 rgba(255,255,255,.45);
  text-shadow:0 1px 1px rgba(255,255,255,.3);transition:transform .2s, box-shadow .2s}
.nextbtn:hover{transform:translateY(-1px);box-shadow:0 7px 22px rgba(201,168,76,.58)}
@media(max-width:520px){.nextbtn{font-size:14.5px;padding:12px 20px}}

/* ================= piè di pagina ================= */
.foot{margin:30px 18px 0;text-align:center;font-size:18px;color:var(--txt-dim);line-height:1.55}
.foot .sep{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.foot .sep .l{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(185,163,227,.5),transparent)}
.foot .sep .d{width:5px;height:5px;border:1px solid var(--glic);transform:rotate(45deg)}
.foot b{color:var(--gold-pale);font-weight:600}

/* toast */
#saved{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(22,17,28,.96);color:var(--glic-hi);border:1px solid rgba(185,163,227,.5);border-radius:30px;padding:9px 20px;font-family:'Cinzel',serif;font-size:14.5px;letter-spacing:.08em;z-index:70;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:90vw;text-align:center}
#saved.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ================= pannello GUIDA (apre toccando la luce) ================= */
#veil{position:fixed;inset:0;z-index:60;background:rgba(4,3,8,.72);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .45s ease}
#veil.on{opacity:1;pointer-events:auto}
#gpan{position:fixed;z-index:61;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);width:min(720px,94vw);height:min(86vh,820px);
  display:flex;flex-direction:column;border:1px solid rgba(185,163,227,.35);border-radius:18px;
  background:linear-gradient(180deg, rgba(13,10,18,.97), rgba(10,8,14,.97)), url('/src/pagina.jpg') center/cover;
  box-shadow:0 0 60px rgba(150,110,215,.25), 0 30px 80px rgba(0,0,0,.7);opacity:0;pointer-events:none;
  transition:opacity .45s ease, transform .45s ease}
#gpan.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.gp-hd{display:flex;align-items:center;gap:12px;padding:18px 20px 14px;border-bottom:1px solid rgba(185,163,227,.2)}
.gp-orb{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 34%, #fff 0%, #fff 30%, var(--lm-mid) 60%, transparent 80%);
  box-shadow:0 0 10px 3px var(--lm-g1), 0 0 26px 10px var(--lm-g2);animation:lflick 3.1s ease-in-out infinite}
.gp-hd h2{font-family:'Cinzel',serif;font-size:21px;font-weight:600;color:#f0eaf6;flex:1;text-shadow:0 0 18px rgba(185,163,227,.4)}
.gp-x{background:none;border:1px solid rgba(185,163,227,.4);color:var(--txt-soft);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:19px;line-height:1}
.gp-x:hover{color:#fff;border-color:var(--glic-hi)}
.gp-bd{flex:1;overflow-y:auto;padding:18px 20px 26px;-webkit-overflow-scrolling:touch}
.gp-bd p{font-size:20px;line-height:1.62;color:var(--txt-soft);margin-bottom:12px}
.gp-bd p b{color:var(--gold-pale);font-weight:600}
/* barra audio dentro la luce: identica in ogni area (controlla la musica della shell) */
#mu-mini{margin-bottom:14px}
.mm-label{font-family:'Cinzel',serif;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--glic);margin-bottom:5px}
.mm-title{font-size:18px;color:#f0eaf6;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.mm-ctrls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.mm-btn{background:linear-gradient(180deg,rgba(42,30,62,.82) 0%,rgba(22,14,36,.92) 100%);border:1px solid rgba(185,163,227,.22);border-top-color:rgba(220,205,250,.32);cursor:pointer;color:var(--glic-hi);padding:4px;border-radius:50%;transition:all .18s;width:34px;height:34px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.06)}
.mm-btn:hover{background:linear-gradient(180deg,rgba(62,44,90,.88) 0%,rgba(38,24,58,.94) 100%)}
.mm-btn.mm-play{background:radial-gradient(circle at 38% 32%,rgba(220,205,250,.24) 0%,rgba(185,163,227,.16) 45%,rgba(80,50,120,.3) 100%);border:1px solid rgba(185,163,227,.4);border-top-color:rgba(236,223,248,.5);width:38px;height:38px;box-shadow:0 4px 14px rgba(0,0,0,.42),0 0 16px rgba(185,163,227,.18),inset 0 1px 0 rgba(255,255,255,.08)}
.mm-btn svg{width:16px;height:16px;display:block}
.mm-btn.mm-play svg{width:18px;height:18px}
.mm-bar{position:relative;height:5px;border-radius:5px;background:rgba(10,8,16,.75);margin:0 4px;cursor:pointer;touch-action:none;box-shadow:inset 0 2px 4px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.04)}
.mm-bar::before{content:'';position:absolute;left:0;right:0;top:-11px;bottom:-11px}
.mm-fill{height:100%;border-radius:5px;background:linear-gradient(180deg,var(--glic-hi) 0%,var(--glic) 55%,#9070c8 100%);width:0%;pointer-events:none;box-shadow:0 0 8px rgba(185,163,227,.5),inset 0 1px 0 rgba(255,255,255,.18)}

@media(max-width:520px){
  .vid,.vmeta,.txt,.points,.unlock,.intro{margin-left:13px;margin-right:13px}
  .hd .lead{font-size:19px}
  .txt{font-size:18.5px}
}
</style>
</head>
<body>

<!-- freccetta indietro fissa: torna alla dashboard -->
<button id="back-fab" class="back-fab" type="button" aria-label="Torna indietro" title="Torna indietro">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
</button>

<!-- la luce guida: sempre presente; toccala per la sua voce e per la musica -->
<div id="lume" title="Tocca la luce per saperne di più"></div>

<div class="page">

  <header class="hd">
    <div class="orn"><div class="l"></div><div class="d"></div><div class="l"></div></div>
    <div class="cap" id="cap">Il Cammino Interiore</div>
    <h1 id="h1">—</h1>
    <p class="lead" id="lead"></p>
  </header>

  <div class="intro">
    Guarda il video con calma: la riproduzione viene registrata, così sai sempre a che punto sei.
    <span class="lampada">✦ Tocca la piccola luce per la voce della Guida e la musica ✦</span>

  <!-- il video di Elisa (embed Vimeo nativo: le statistiche di visualizzazione si registrano) -->

  <!-- nota di sblocco (solo «La Frequenza Nascosta») -->

  <div class="foot">
    <div class="sep"><span class="l"></span><span class="d"></span><span class="l"></span></div>
    <span id="foot"></span>
  </div>

</div>

<!-- pannello GUIDA -->
<div id="veil"></div>
<aside id="gpan" role="dialog" aria-label="La voce della Guida">
  <div class="gp-hd"><div class="gp-orb"></div><h2 id="gpTitle">La Guida del Cammino</h2><button class="gp-x" id="gpX" aria-label="Chiudi">✕</button></div>
  <div class="gp-bd">
    <div id="mu-mini" style="display:none">
      <div class="mm-label">In riproduzione</div>
      <div class="mm-title" id="mm-title">—</div>
      <div class="mm-ctrls">
        <button class="mm-btn" id="mm-prev" aria-label="Precedente"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="5" width="2.5" height="14" rx="1.2"/><path d="M8 12 19 5v14z"/></svg></button>
        <button class="mm-btn mm-play" id="mm-play" aria-label="Play/Pausa"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="mm-btn" id="mm-next" aria-label="Successiva"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="17.5" y="5" width="2.5" height="14" rx="1.2"/><path d="M16 12 5 5v14z"/></svg></button>
      </div>
      <div class="mm-bar" id="mm-bar"><div class="mm-fill" id="mm-fill"></div></div>
    </div>
    <div id="gpBody"></div>
  </div>
</aside>

<div id="saved"></div>

<!-- SDK del player Vimeo: per il tracciamento del progresso. Le statistiche native di Vimeo si registrano comunque da sole. -->
<script src="https://player.vimeo.com/api/player.js"></script>
<script src="/app/lume.js?v=4"></script>
<script src="/app/ovl-cloud.js?v=2"></script>
<script>
/* ====== configurazione delle due lezioni ====== */
var LEZ={
  intro:{
    vid:'1174344514',
    cap:'Il Cammino Interiore · Il benvenuto',
    h1:'Introduzione',
    title:'Introduzione',
    lead:'Ti do il mio benvenuto e ti racconto che cos’è questo cammino: non un percorso di soli esercizi, ma un viaggio dentro le nostre emozioni, per conoscere chi siamo davvero.',

(function(){
  var inShell=false; try{ inShell = window.parent && window.parent!==window; }catch(e){ inShell=false; }
  function goBack(e){ if(e)e.preventDefault();
    if(inShell){ window.parent.postMessage({t:'day:back'}, location.origin); } else { history.back(); } }
  var fab=document.getElementById('back-fab'); if(fab) fab.addEventListener('click', goBack);

  /* quale lezione? (?l=intro | ?l=frequenza) */
  var which='intro';
  try{ var q=(location.search.match(/[?&]l=([a-z]+)/)||[])[1]; if(q && LEZ[q]) which=q; }catch(e){}
  var LZ=LEZ[which];

  var who=''; try{ who=(localStorage.getItem('ovl-user')||'').trim().toLowerCase(); }catch(e){}
  var TOKEN=''; try{ TOKEN=localStorage.getItem('ovl-session')||''; }catch(e){}
  /* colore della luce = livello (fiore) della persona */
  try{ if(window.OVL_LUME){ var _S=OVL_LUME.loadLocal(who); var _md=false; try{_md=localStorage.getItem('ovl-mondo:'+who)==='1';}catch(_e){} OVL_LUME.applyTier(OVL_LUME.allActiveDays(_S.store).length, _md); } }catch(e){}

  document.title = LZ.title + ' · Il Cammino Interiore · Elisa Soul Medium';
  document.getElementById('cap').textContent = LZ.cap;
  document.getElementById('h1').textContent = LZ.h1;
  document.getElementById('lead').innerHTML = LZ.lead;
  var txtEl=document.getElementById('txt'); if(LZ.txt){ txtEl.innerHTML=LZ.txt; } else { txtEl.style.display='none'; }
  var ul=document.getElementById('points'); ul.innerHTML='';
  LZ.points.forEach(function(p){ var li=document.createElement('li'); li.innerHTML=p; ul.appendChild(li); });
  document.getElementById('foot').innerHTML = LZ.foot;

  /* ====== progresso del video (legato alla mail, nella nuvola) ====== */
  var SEEN_AT=0.85;
  var KEY='ovl-percorso:'+who;
  var prog={}; try{ prog=JSON.parse(localStorage.getItem(KEY)||'{}')||{}; }catch(e){ prog={}; }
  var cloud = window.OVL_CLOUD ? OVL_CLOUD.bucket({ email:who, token:TOKEN, localKey:KEY, ns:'perc', seed:true }) : null;
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(prog)); }catch(e){} if(cloud) cloud.push(); }
  function isSeen(){ return (prog[which]||0) >= SEEN_AT; }
  function mmss(s){ if(!s||isNaN(s))return ''; s=Math.round(s); var m=Math.floor(s/60); var r=s%60; return m+':'+(r<10?'0':'')+r; }

  /* avvisa la dashboard quando questo video diventa "visto" (sblocca il Giornaliero) */
  function notifyParent(){ if(inShell){ try{ window.parent.postMessage({t:'cap2-changed'}, location.origin); }catch(e){} } }

  var statusEl=document.getElementById('vstatus'), btnSeen=document.getElementById('btnSeen'),
      unlockEl=document.getElementById('unlock'), nextBtn=document.getElementById('nextBtn');
  function refresh(){
    var seen=isSeen();
    statusEl.textContent = seen ? '✓ Visto' : ((prog[which]||0)>0 ? 'In corso' : 'Da vedere');
    statusEl.classList.toggle('is-seen', seen);
    btnSeen.classList.toggle('is-done', seen);
    btnSeen.textContent = seen ? 'Visto' : 'Segna come visto';
    if(which==='frequenza'){
      unlockEl.style.display='';
      unlockEl.classList.toggle('done', seen);
      unlockEl.innerHTML = 'Questo video è <b>tutta la spiegazione</b>, prima di affrontare la sessione dedicata agli <b>esercizi giornalieri</b>: la trovi nella prossima sezione.';
      nextBtn.style.display = seen ? '' : 'none';   /* la sessione successiva si apre dopo aver visto la spiegazione */
    }
  }
  /* il pulsante NON entra nel Giornaliero: torna alla home e ti porta sulla sua card (poi entri tu) */
  function goToDay(){ if(inShell){ window.parent.postMessage({t:'goto', id:'day'}, location.origin); } else { location.href='/app/'; } }
  nextBtn.addEventListener('click', goToDay);

  /* carico il video + tracciamento */
  var box=document.getElementById('vid'), durEl=document.getElementById('vdur');
  (function loadVideo(){
    var ifr=document.createElement('iframe');
    ifr.src='https://player.vimeo.com/video/'+LZ.vid+'?title=0&byline=0&portrait=0&badge=0';
    ifr.setAttribute('allow','autoplay; fullscreen; picture-in-picture');
    ifr.setAttribute('allowfullscreen','');
    box.innerHTML=''; box.appendChild(ifr);
    if(!(window.Vimeo && Vimeo.Player)) return;
    var p; try{ p=new Vimeo.Player(ifr); }catch(e){ return; }
    p.getDuration().then(function(s){ if(s) durEl.textContent='La mia voce · '+mmss(s); }).catch(function(){});
    var lastSaved=prog[which]||0, wasSeen=isSeen();
    p.on('timeupdate', function(d){
      if(d.percent>(prog[which]||0)){
        prog[which]=d.percent;
        if(d.percent-lastSaved>=0.05){ lastSaved=d.percent; save(); }
        if(d.percent>=SEEN_AT && !wasSeen){ wasSeen=true; save(); refresh(); notifyParent(); }
      }
    });
    p.on('ended', function(){ prog[which]=1; save(); refresh(); notifyParent(); });
  })();

  btnSeen.addEventListener('click', function(){
    prog[which] = isSeen() ? 0 : 1;   /* completa / annulla */
    save(); refresh(); notifyParent();
  });

  refresh();
  /* scarico dalla nuvola ciò che è stato visto su altri device e ridisegno */
  if(cloud) cloud.pull(function(changed){ if(changed){ refresh(); notifyParent(); } });
  addEventListener('pagehide', function(){ if(cloud) cloud.beacon(); });

  /* ====== la luce: posa in alto e, toccandola, apre la Guida con la musica ====== */
  var lume=document.getElementById('lume');
  function isNarrow(){ return innerWidth < 760; }
  function moveLume(x,y){ lume.style.transform='translate3d('+(x|0)+'px,'+(y|0)+'px,0)'; }
  function lumeHome(){ var hd=document.querySelector('.hd');
    var x = isNarrow() ? 30 : Math.max(30, innerWidth/2 - 400);
    moveLume(x, (hd?hd.offsetTop:20) + 58); }
  addEventListener('resize', lumeHome);

  /* ====== pannello GUIDA ====== */
  var veil=document.getElementById('veil'), gpan=document.getElementById('gpan');
  function openGuide(){
    document.getElementById('gpTitle').textContent = LZ.title;
    document.getElementById('gpBody').innerHTML = LZ.guide;
    var bd=gpan.querySelector('.gp-bd'); if(bd)bd.scrollTop=0;
    muSend('state');
    veil.classList.add('on'); gpan.classList.add('on');
  }
  function closeGuide(){ veil.classList.remove('on'); gpan.classList.remove('on'); }
  lume.addEventListener('click', function(e){ e.stopPropagation(); openGuide(); });
  veil.addEventListener('click', closeGuide);
  document.getElementById('gpX').addEventListener('click', closeGuide);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeGuide(); });

  /* ===== barra audio dentro la luce: comanda la musica della shell, presente in ogni area ===== */
  function muSend(cmd,v){ try{ if(window.parent&&window.parent!==window) window.parent.postMessage({t:'mu:cmd',cmd:cmd,v:v}, location.origin); }catch(e){} }
  (function(){
    var mini=document.getElementById('mu-mini'); if(!mini) return;
    if(!inShell){ mini.style.display='none'; return; }
    var bP=document.getElementById('mm-prev'), bT=document.getElementById('mm-play'), bN=document.getElementById('mm-next'), bar=document.getElementById('mm-bar');
    if(bP) bP.addEventListener('click', function(){ muSend('prev'); });
    if(bT) bT.addEventListener('click', function(){ muSend('toggle'); });
    if(bN) bN.addEventListener('click', function(){ muSend('next'); });
    var dragS=false;
    if(bar){
      var frac=function(e){ var r=bar.getBoundingClientRect(); return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); };
      var paintF=function(f){ var fl=document.getElementById('mm-fill'); if(fl) fl.style.width=(f*100).toFixed(2)+'%'; };
      bar.addEventListener('pointerdown', function(e){ e.preventDefault();
        var f=frac(e), st=null; dragS=true; paintF(f);   /* la barra segue il dito */
        var mv=function(ev){ f=frac(ev); paintF(f); if(st===null){ st=setTimeout(function(){ st=null; muSend('seek',f); }, 80); } };
        var up=function(){ if(st!==null){ clearTimeout(st); st=null; } muSend('seek',f); dragS=false; document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); document.removeEventListener('pointercancel',up); };
        document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up); document.addEventListener('pointercancel',up);
      });
    }
    var SVG_PLAY='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    var SVG_PAUSE='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
    window.addEventListener('message', function(e){
      if(e.origin!==location.origin) return;
      var m=e.data||{}; if(m.t!=='mu:state') return;
      mini.style.display = m.active ? 'block' : 'none';
      var tt=document.getElementById('mm-title'); if(tt) tt.textContent=m.title||'—';
      if(bT) bT.innerHTML = m.playing ? SVG_PAUSE : SVG_PLAY;
      if(!dragS){ var fl=document.getElementById('mm-fill'); if(fl) fl.style.width=((m.frac||0)*100).toFixed(2)+'%'; }
    });
    muSend('state');
  })();

  lumeHome();
})();
</script>
<script src="/app/track.js"></script>

<script src="/app/wake-lock.js?v=1"></script>
</body>
