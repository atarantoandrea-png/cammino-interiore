<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Il Cammino Interiore · Prova gratuita — Elisa Soul Medium</title>
<link rel="icon" type="image/png" href="/src/favicon-32.png" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--glic:#b9a3e3;--glic-hi:#dccdf6;--gold:#c9a84c;--gold-pale:#e8d9ae;--cele:#b9ddf6;--seen:#8fd6a8;--seen-glow:rgba(127,214,160,.5);
  --txt:#e9e4f0;--txt-soft:#bcb3c9;--txt-dim:#8d8499;--card:rgba(20,15,30,.62);--card-line:rgba(185,163,227,.18)}
html{scroll-behavior:smooth}
body{font-family:'Cormorant Garamond',Georgia,serif;color:var(--txt);min-height:100dvh;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(8,7,11,.95) 0%,rgba(10,9,13,.92) 8%,rgba(11,10,14,.91) 100%),url('/src/pagina.jpg') center top/100% auto repeat;
  background-attachment:fixed;
  /* luce: grado "Risveglio" */
  --lm-c1:#fff4ea;--lm-mid:#dca06b;--lm-g1:rgba(235,186,138,.7);--lm-g2:rgba(205,148,96,.46);--lm-g3:rgba(176,112,64,.24)}
.wrap{width:100%;max-width:620px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 8px) 18px calc(60px + env(safe-area-inset-bottom));flex:1}

/* header */
header.hd{padding:46px 0 6px;text-align:center;position:relative;z-index:2}
.hd .orn{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.hd .orn .l{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(185,163,227,.6),transparent)}
.hd .orn .d{width:6px;height:6px;border:1px solid var(--glic);transform:rotate(45deg)}
.hd h1{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(22px,5.6vw,30px);letter-spacing:.08em;color:#f0eaf6;text-shadow:0 0 30px rgba(185,163,227,.35)}
.hd p{font-size:19px;color:var(--txt-soft);margin-top:8px;line-height:1.55}
#hdSub:empty{display:none}

/* ===== REGISTRAZIONE (glass) ===== */
.glass{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(190,165,235,.13),rgba(150,120,210,.06) 48%,rgba(255,255,255,.04));
  border:1px solid rgba(205,180,245,.30);border-radius:22px;padding:24px 22px;margin-top:18px;
  -webkit-backdrop-filter:blur(16px) saturate(140%);backdrop-filter:blur(16px) saturate(140%);
  box-shadow:0 14px 40px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.14)}
.glass::before{content:"";position:absolute;top:-40%;left:-12%;width:55%;height:180%;pointer-events:none;
  background:linear-gradient(115deg,rgba(255,255,255,.12),rgba(255,255,255,0) 60%);transform:rotate(8deg)}
.glass>*{position:relative;z-index:1}
.sect-t{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.07em;text-transform:uppercase;color:var(--gold-pale);text-align:center;margin:0 0 14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:15px;color:var(--txt-soft);margin:0 0 6px 4px}
.field input{width:100%;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--txt);background:rgba(185,163,227,.07);border:1px solid var(--card-line);border-radius:13px;padding:14px 15px;outline:none}
.field input:focus{border-color:var(--glic)}
.consent{display:flex;gap:10px;align-items:flex-start;margin:6px 2px 16px;font-size:15px;color:var(--txt-soft);line-height:1.4}
.consent input{width:20px;height:20px;flex-shrink:0;margin-top:2px;accent-color:#a98fd6}
.consent a{color:var(--glic-hi)}
.btn{display:flex;align-items:center;justify-content:center;width:100%;border:none;cursor:pointer;font-family:'Cinzel',serif;font-weight:600;font-size:16px;letter-spacing:.03em;border-radius:15px;padding:16px;color:#1c1428;background:linear-gradient(135deg,#c9b3ef,#a98fd6);box-shadow:0 8px 26px rgba(185,163,227,.4);transition:transform .15s,opacity .2s}
.btn:active{transform:scale(.98)} .btn[disabled]{opacity:.55;cursor:default}
.err{color:#f0a8a8;font-size:15px;text-align:center;min-height:20px;margin-top:10px}
.prova-img{display:block;width:100%;max-width:400px;margin:18px auto 0;border-radius:16px;border:1px solid var(--card-line);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.hide{display:none!important}

/* ===== CASA: sentiero come l'app ===== */
.dlbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--txt-dim);margin:28px 0 14px;text-align:center}
/* video tour */
.tour{max-width:236px;margin:18px auto 0}
.tour .vframe{position:relative;width:100%;padding-top:217%;border-radius:18px;overflow:hidden;background:#0c0913;border:1px solid var(--card-line);box-shadow:0 14px 36px rgba(0,0,0,.5)}
.tour .vframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.tour .vph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--txt-dim);font-family:'Cinzel',serif;font-size:13px}
/* path */
.path{position:relative;list-style:none;max-width:560px;margin:0 auto;padding:0}
.path::before{content:'';position:absolute;left:50%;top:80px;bottom:80px;width:1px;background:linear-gradient(180deg,transparent,rgba(185,163,227,.14) 18%,rgba(185,163,227,.14) 82%,transparent)}
.steps{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px 0}
.fp{color:rgba(185,163,227,.4);filter:drop-shadow(0 0 6px rgba(185,163,227,.3))}
.steps .fp:nth-child(odd){transform:translateX(-15px) rotate(-8deg)}
.steps .fp:nth-child(even){transform:translateX(15px) rotate(8deg) scale(-1,1)}
.excard{display:block;width:100%;text-align:left;border:1px solid var(--card-line);background:var(--card);border-radius:16px;overflow:hidden;position:relative;cursor:pointer;font:inherit;color:inherit;transition:transform .3s,box-shadow .9s,border-color .9s}
.excard:hover{transform:translateY(-3px)}
.excover{height:128px;position:relative;overflow:hidden;
  background:radial-gradient(420px 200px at 50% 110%,rgba(150,110,215,.4),rgba(150,110,215,.08) 55%,transparent 75%),linear-gradient(180deg,rgba(14,11,19,.88),rgba(20,16,27,.84)),url('/src/pagina.jpg') center/cover}
.excover .ring{position:absolute;left:50%;top:50%;width:88px;height:88px;transform:translate(-50%,-50%) rotate(45deg);border:1px solid rgba(185,163,227,.4)}
.excover .sym{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:42px;line-height:1;filter:drop-shadow(0 0 18px rgba(186,150,240,.8))}
.exbody{padding:16px 18px 18px}
.exbadge{font-family:'Cinzel',serif;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--glic);margin-bottom:6px}
.excard h3{font-family:'Cinzel',serif;font-size:21px;font-weight:600;color:#f0eaf6;margin-bottom:7px}
.exdesc{font-size:17.5px;line-height:1.55;color:var(--txt-soft);margin-bottom:12px}
.exgo{font-family:'Cinzel',serif;font-size:13.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-pale)}
/* tappe bloccate */
.excard.locked .excover{filter:grayscale(.6) brightness(.42)}
.excard.locked .exbody{opacity:.55}
.excard.locked .exgo{color:var(--gold-pale)}
.exlock{position:absolute;top:12px;right:12px;z-index:3;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#ff8a96;
  background:radial-gradient(circle at 38% 32%,rgba(58,30,38,.97),rgba(30,18,22,.97));border:1px solid rgba(224,85,102,.6);
  box-shadow:0 3px 10px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.12),0 0 16px rgba(224,85,102,.3)}
.exlock svg{width:18px;height:18px;filter:drop-shadow(0 0 6px rgba(224,85,102,.5))}
/* CTA */
.cta{display:block;text-align:center;text-decoration:none;margin:26px auto 0;max-width:560px;border-radius:16px;padding:17px;
  font-family:'Cinzel',serif;font-weight:600;font-size:16px;letter-spacing:.04em;color:#1c1428;background:linear-gradient(135deg,#e8d9ae,#c9a84c);box-shadow:0 8px 28px rgba(201,168,76,.34);transition:transform .15s,box-shadow .3s}
.cta.pulse{animation:ctaPulse 1.4s ease 2}
@keyframes ctaPulse{0%,100%{box-shadow:0 8px 28px rgba(201,168,76,.34)}50%{box-shadow:0 8px 34px rgba(201,168,76,.7),0 0 0 3px rgba(201,168,76,.4)}}
.cta:active{transform:scale(.98)}
.cta-sub{text-align:center;font-size:15px;color:var(--txt-dim);margin-top:10px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);z-index:80;opacity:0;pointer-events:none;
  background:rgba(28,22,40,.96);border:1px solid var(--card-line);color:var(--glic-hi);font-size:15.5px;padding:11px 18px;border-radius:30px;transition:opacity .3s,transform .3s;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== LA LUCE (apre la chat) ===== */
.luce-fab{position:fixed;right:18px;bottom:20px;z-index:50;width:66px;height:66px;cursor:pointer;border:none;background:none;padding:0;animation:lflick 3.1s ease-in-out infinite}
.luce-fab::after{content:'';position:absolute;inset:14px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%,var(--lm-c1) 0%,var(--lm-c1) 28%,var(--lm-mid) 58%,transparent 78%);
  box-shadow:0 0 12px 4px var(--lm-g1),0 0 30px 12px var(--lm-g2),0 0 68px 30px var(--lm-g3),inset 0 0 4px rgba(220,215,245,.5)}
@keyframes lflick{0%,100%{filter:brightness(1)}50%{filter:brightness(1.28)}}
.luce-hint{position:fixed;right:88px;bottom:38px;z-index:50;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.06em;color:var(--glic-hi);
  background:rgba(20,15,30,.85);border:1px solid var(--card-line);padding:7px 12px;border-radius:20px;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.4)}
/* chat overlay */
#chatVeil{position:fixed;inset:0;z-index:60;background:rgba(4,3,8,.72);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .4s}
#chatVeil.on{opacity:1;pointer-events:auto}
#chatPanel{position:fixed;z-index:70;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);width:min(94vw,520px);max-height:86vh;display:flex;flex-direction:column;
  background:linear-gradient(165deg,#241b37,#140f22);border:1px solid rgba(205,178,242,.3);border-radius:22px;padding:16px 16px 14px;
  opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;box-shadow:0 24px 70px rgba(0,0,0,.6)}
#chatPanel.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.cp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cp-hd .t{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.06em;color:var(--glic-hi)}
.cp-x{background:none;border:none;color:var(--txt-soft);font-size:22px;cursor:pointer;line-height:1}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding:2px;min-height:120px}
.msg{max-width:88%;padding:11px 14px;border-radius:15px;font-size:16.5px;line-height:1.5;white-space:pre-wrap}
.msg.io{align-self:flex-end;background:linear-gradient(135deg,#c9b3ef,#a98fd6);color:#1c1428;border-bottom-right-radius:5px}
.msg.bot{align-self:flex-start;background:rgba(185,163,227,.1);border:1px solid var(--card-line);color:var(--txt);border-bottom-left-radius:5px}
.msg.bot .who{display:block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--glic);margin-bottom:4px}
.chat-in{display:flex;gap:8px}
.chat-in input{flex:1;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--txt);background:rgba(185,163,227,.07);border:1px solid var(--card-line);border-radius:13px;padding:13px 14px;outline:none}
.chat-in input:focus{border-color:var(--glic)}
.chat-send{flex-shrink:0;border:none;cursor:pointer;border-radius:13px;padding:0 18px;color:#1c1428;background:linear-gradient(135deg,#c9b3ef,#a98fd6);font-family:'Cinzel',serif;font-weight:600}
.left-count{font-size:13.5px;color:var(--txt-dim);text-align:center;margin-top:9px}
.paywall{text-align:center;padding:6px 2px}
.paywall .em{font-size:32px}
.paywall p{font-size:16px;color:var(--txt-soft);line-height:1.55;margin:9px 0}
.paywall b{color:var(--glic-hi);font-weight:600}
footer{text-align:center;padding:24px 14px;position:relative;z-index:2;font-size:16px;color:var(--txt-dim)}
</style>
</head>
<body>
<div class="wrap">

  <header class="hd">
    <div class="orn"><span class="l"></span><span class="d"></span><span class="l"></span></div>
    <h1>Il Cammino Interiore</h1>
    <p id="hdSub"></p>
  </header>

  <!-- ============ REGISTRAZIONE ============ -->
  <div id="formView" class="glass">
    <p class="sect-t">Inizia la tua prova gratuita</p>
    <div class="field"><label>Come ti chiami?</label><input id="f-name" type="text" autocomplete="name" placeholder="Nome e cognome"></div>
    <div class="field"><label>La tua email</label><input id="f-email" type="email" autocomplete="email" placeholder="latua@email.it"></div>
    <div class="field"><label>Il tuo numero di telefono</label><input id="f-phone" type="tel" autocomplete="tel" placeholder="+39 …"></div>

      <span>Acconsento al trattamento dei miei dati per ricevere l'accesso alla prova e comunicazioni sul Cammino Interiore e la community Oltre il Velo, come da <a href="/prova/privacy" target="_blank" rel="noopener">informativa privacy</a>.</span></label>

    <img class="prova-img" src="https://d1yei2z3i6k35z.cloudfront.net/7767646/69e79910b65564.60721058_CamminoInterioreELisaSoulMediumCommunity.png" alt="Il Cammino Interiore — Elisa Soul Medium" loading="lazy">
  </div>

  <!-- ============ CASA DELLA PROVA (come l'app) ============ -->
  <div id="casaView" class="hide">

    <div class="dlbl">Guarda come funziona</div>
    <div class="tour"><div class="vframe" id="vf"><div class="vph">Carico il video…</div></div></div>

    <div class="dlbl">Il tuo sentiero</div>
    <ol class="path" id="path">
      <li><button class="excard locked" data-lock="1"><span class="exlock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <div class="excover"><div class="ring"></div><span class="sym">🌖</span></div>
        <div class="exbody"><div class="exbadge">Introduzione</div><h3>Il benvenuto di Elisa</h3><p class="exdesc">Che cos'è questo viaggio e come viverlo, raccontato dalla sua voce.</p><span class="exgo">Dentro Oltre il Velo →</span></div></button></li>
      <li class="steps"></li>
      <li><button class="excard locked" data-lock="1"><span class="exlock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <div class="excover"><div class="ring"></div><span class="sym">✦</span></div>
        <div class="exbody"><div class="exbadge">Capitolo Primo</div><h3>La Frequenza Nascosta</h3><p class="exdesc">Siamo energia: tutto parte da come ci sentiamo. È la base, e apre la pratica.</p><span class="exgo">Dentro Oltre il Velo →</span></div></button></li>
      <li class="steps"></li>
      <li><button class="excard locked" data-lock="1"><span class="exlock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <div class="excover"><div class="ring"></div><span class="sym">📿</span></div>
        <div class="exbody"><div class="exbadge">Ogni giorno</div><h3>Il Giornaliero</h3><p class="exdesc">Lo Spazio Emotivo e l'Osservatore Interiore: la pratica che ti accompagna sempre.</p><span class="exgo">Dentro Oltre il Velo →</span></div></button></li>
      <li class="steps"></li>
      <li><button class="excard locked" data-lock="1"><span class="exlock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <div class="excover"><div class="ring"></div><span class="sym">🌙</span></div>
        <div class="exbody"><div class="exbadge">Capitolo Secondo</div><h3>Il Mondo Interiore</h3><p class="exdesc">Otto lezioni sulle parti che ti compongono, una a una.</p><span class="exgo">Dentro Oltre il Velo →</span></div></button></li>
      <li class="steps"></li>
      <li><button class="excard locked" data-lock="1"><span class="exlock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <div class="excover"><div class="ring"></div><span class="sym">🧸</span></div>
        <div class="exbody"><div class="exbadge">La prima parte</div><h3>Il Bambino Interiore</h3><p class="exdesc">Incontrare e riabbracciare la tua parte più tenera.</p><span class="exgo">Dentro Oltre il Velo →</span></div></button></li>
    </ol>

    <a class="cta" id="ctaTop" href="https://www.elisasoulmedium.com/oltreilvelo" target="_blank" rel="noopener">Entra in Oltre il Velo →</a>
    <p class="cta-sub">Il cammino intero, la community e gli incontri del mercoledì sera.</p>
  </div>

  <footer>Il Cammino Interiore · Elisa Soul Medium</footer>
</div>

<!-- la Luce (solo nella casa) -->
<button class="luce-fab hide" id="luce" aria-label="Scrivi alla Luce"></button>
<span class="luce-hint hide" id="luceHint">Scrivi alla Luce ✦</span>
<div class="toast" id="toast"></div>

<!-- pannello chat -->
<div id="chatVeil"></div>
<div id="chatPanel">
  <div class="cp-hd"><span class="t">✦ Scrivi alla Luce</span><button class="cp-x" id="cpX" aria-label="Chiudi">✕</button></div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-in" id="chatInWrap">
    <input id="chatIn" type="text" placeholder="Scrivi quello che senti…" maxlength="500">
    <button class="chat-send" id="chatSend">Invia</button>
  </div>
  <p class="left-count" id="leftCount"></p>
</div>

<!-- impronte riusate -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs><g id="fp"><ellipse cx="12" cy="7.5" rx="5.2" ry="5.8"/><ellipse cx="12" cy="27.5" rx="7" ry="10.5"/></g></defs></svg>

<script src="/app/elisa-chat.js"></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  function show(which){ $('formView').classList.toggle('hide',which!=='form'); $('casaView').classList.toggle('hide',which!=='casa');
    $('luce').classList.toggle('hide',which!=='casa'); $('luceHint').classList.toggle('hide',which!=='casa'); }

  /* impronte tra le tappe */
  function fpSvg(){ return '<svg class="fp" viewBox="0 0 24 40" width="20" height="33" fill="currentColor" aria-hidden="true"><use href="#fp"/></svg>'; }
  function paintSteps(){ document.querySelectorAll('#path .steps').forEach(function(li){ if(!li.innerHTML) li.innerHTML=fpSvg()+fpSvg()+fpSvg(); }); }

  /* ---------- REGISTRAZIONE ---------- */
  function register(){
    var name=$('f-name').value.trim(), email=$('f-email').value.trim().toLowerCase(), phone=$('f-phone').value.trim();
    var err=$('f-err'); err.textContent='';
    if(!name){ err.textContent='Scrivi il tuo nome.'; return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){ err.textContent='Scrivi una email valida.'; return; }
    if(phone.replace(/\D/g,'').length<6){ err.textContent='Scrivi un numero di telefono valido.'; return; }
    if(!$('f-consent').checked){ err.textContent='Per procedere serve il consenso alla privacy.'; return; }
    var btn=$('f-btn'); btn.disabled=true; btn.textContent='Un attimo…';
    fetch('/api/trial/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,email:email,phone:phone,consent:true})})
      .then(function(r){return r.json();})
      .then(function(d){ if(d&&d.ok){ enterCasa(name); } else { err.textContent=(d&&d.reason==='consent')?'Per procedere serve il consenso.':'Qualcosa non ha funzionato. Riprova.'; btn.disabled=false; btn.textContent='Inizia la prova gratuita'; } })
      .catch(function(){ err.textContent='Errore di rete. Riprova.'; btn.disabled=false; btn.textContent='Inizia la prova gratuita'; });
  }
  $('f-btn').addEventListener('click',register);
  $('f-phone').addEventListener('keydown',function(e){ if(e.key==='Enter') register(); });

  /* ---------- CASA ---------- */
  var videoLoaded=false;
  function enterCasa(name){
    show('casa'); window.scrollTo(0,0);
    $('hdSub').textContent = name ? ('Benvenuto/a, '+name.split(' ')[0]+' 💓') : 'Il tuo assaggio del Cammino 💓';
    paintSteps();
    if(!videoLoaded){ videoLoaded=true; var ifr=document.createElement('iframe');
      ifr.src='https://player.vimeo.com/video/1202625088?title=0&byline=0&portrait=0&badge=0';
      ifr.setAttribute('allow','autoplay; fullscreen; picture-in-picture'); ifr.setAttribute('allowfullscreen','');
      $('vf').innerHTML=''; $('vf').appendChild(ifr); }
  }
  /* tappe bloccate → invito gentile + pulse della CTA */
  function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._tm); t._tm=setTimeout(function(){t.classList.remove('on');},2600); }
  document.querySelectorAll('.excard.locked').forEach(function(c){
    c.addEventListener('click',function(){ toast('Questa tappa ti aspetta dentro Oltre il Velo 💓');
      var cta=$('ctaTop'); cta.scrollIntoView({behavior:'smooth',block:'center'}); cta.classList.remove('pulse'); void cta.offsetWidth; cta.classList.add('pulse'); });
  });

  /* ---------- CHAT con la Luce (3 al giorno, limite server) ---------- */
  var chatHist=[], greeted=false, blocked=false;
  function localDate(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function openChat(){ $('chatVeil').classList.add('on'); $('chatPanel').classList.add('on'); $('luceHint').classList.add('hide'); primaLuce(); setTimeout(function(){ if(!blocked) $('chatIn').focus(); },300); }
  function closeChat(){ $('chatVeil').classList.remove('on'); $('chatPanel').classList.remove('on'); }
  $('luce').addEventListener('click',openChat);
  $('cpX').addEventListener('click',closeChat);
  $('chatVeil').addEventListener('click',closeChat);
  function bubble(role,text){ var d=document.createElement('div'); d.className='msg '+(role==='io'?'io':'bot');
    if(role!=='io'){ var w=document.createElement('span'); w.className='who'; w.textContent='La Luce'; d.appendChild(w); }
    var p=document.createElement('span'); p.textContent=text; d.appendChild(p); $('chatMsgs').appendChild(d); $('chatMsgs').scrollTop=$('chatMsgs').scrollHeight; return d; }
  function primaLuce(){ if(greeted) return; greeted=true; bubble('bot','Ciao 💓 Sono la Luce che accompagna il Cammino. Puoi farmi qualche domanda su ciò che senti, sul tuo percorso, sull\'aldilà. Scrivi pure quello che hai dentro.'); }
  function setLeft(used,max){ var left=Math.max(0,max-used); $('leftCount').textContent = left>0 ? ('Ti '+(left===1?'resta':'restano')+' '+left+' '+(left===1?'domanda':'domande')+' oggi.') : ''; }
  function paywall(){ blocked=true; $('chatInWrap').classList.add('hide'); $('leftCount').textContent='';
    var box=document.createElement('div'); box.className='paywall';
    box.innerHTML='<div class="em">💓</div>'+
      '<p><b>Per oggi la Luce si ferma qui.</b></p>'+
      '<p>Sono tantissime le persone che ogni giorno scrivono alla Luce, e la Luce è una sola. Per riuscire a esserci con calma per ciascuno, qui ti accompagno con poche domande al giorno: così ogni risposta resta curata, e non si perde nella fretta di mille richieste.</p>'+
      '<p>La presenza piena, senza queste pause, la tengo per chi cammina dentro <b>Oltre il Velo</b>: è giusto dare la precedenza a chi ha scelto di restare. Torna domani per altre domande — e se senti che è il tuo momento, ti aspetto dentro.</p>'+
      '<a class="cta" href="https://www.elisasoulmedium.com/oltreilvelo" target="_blank" rel="noopener" style="margin-top:14px;display:block">Entra in Oltre il Velo →</a>';
    $('chatMsgs').appendChild(box); $('chatMsgs').scrollTop=$('chatMsgs').scrollHeight; }
  function ask(text){ text=(text||'').trim(); if(!text||blocked) return; $('chatIn').value=''; bubble('io',text); var typing=bubble('bot','…');
    fetch('/api/trial/chat-allow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lday:localDate()})})
      .then(function(r){return r.json();})
      .then(function(g){
        if(!g||!g.ok){ typing.querySelector('span:last-child').textContent='In questo momento non riesco a risponderti, riprova tra poco.'; return; }
        if(!g.allowed){ if(typing.parentNode)typing.parentNode.removeChild(typing); paywall(); return; }
        setLeft(g.used,g.max);
        if(!window.OVL_ELISA){ typing.querySelector('span:last-child').textContent='In questo momento non riesco a risponderti, riprova tra poco.'; return; }
        OVL_ELISA.rispondi(text,chatHist,function(rr){ if(typing.parentNode)typing.parentNode.removeChild(typing);
          var ans=(rr&&rr.answer)||'Su questo non ho ancora una risposta pronta 🙏🏻'; bubble('bot',ans);
          chatHist.push({role:'user',text:text}); chatHist.push({role:'bot',text:ans});
          if(g.used>=g.max) setTimeout(paywall,400); });
      })
      .catch(function(){ if(typing.querySelector('span:last-child')) typing.querySelector('span:last-child').textContent='Errore di rete, riprova.'; });
  }
  $('chatSend').addEventListener('click',function(){ ask($('chatIn').value); });
  $('chatIn').addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); ask(this.value); } });

  /* ---------- avvio ---------- */
  fetch('/api/trial/me').then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ enterCasa(''); } else { show('form'); } }).catch(function(){ show('form'); });
})();
</script>
</body>
</html>
